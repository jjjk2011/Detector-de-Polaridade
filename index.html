<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AudioBase Pro | v12.0 Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'ab-bg': '#0a0d14', 'ab-card': '#161b22', 'ab-border': '#30363d', 'ab-cyan': '#06b6d4', 'ab-purple': '#a855f7', 'ab-green': '#22c55e', 'ab-gold': '#f59e0b', 'ab-red': '#ef4444' } } }
        }
    </script>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { background-color: #0a0d14; color: #c9d1d9; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); overflow-x: hidden; }
        .display-huge { font-size: clamp(3.5rem, 18vw, 7rem); line-height: 1; font-family: 'Courier New', monospace; font-weight: 900; }
        .display-vrms { font-size: clamp(2rem, 10vw, 4.5rem); line-height: 1; font-family: 'Courier New', monospace; font-weight: 900; }
        .nav-btn { transition: all 0.2s; cursor: pointer; white-space: nowrap; font-size: clamp(10px, 2.5vw, 12px); border: 1px solid transparent; }
        .nav-btn.active { background-color: #06b6d4; color: #0a0d14; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .active-ring-pos { border-color: #22c55e !important; box-shadow: 0 0 30px rgba(34, 197, 94, 0.2); background: rgba(34, 197, 94, 0.05); }
        .active-ring-neg { border-color: #ef4444 !important; box-shadow: 0 0 30px rgba(239, 68, 68, 0.2); background: rgba(239, 68, 68, 0.05); }
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 6px; background: #30363d; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%; background: #06b6d4; margin-top: -8px; border: 3px solid #0a0d14; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="reportModal" class="modal" onclick="closeModal()">
        <div class="bg-ab-card w-full max-w-lg rounded-[2.5rem] border border-ab-border p-6 shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center border-b border-ab-border pb-4 mb-4">
                <h3 class="text-ab-cyan font-black uppercase italic tracking-widest text-sm">Relatório Técnico</h3>
                <button onclick="closeModal()" class="text-slate-500 text-2xl">&times;</button>
            </div>
            <div id="reportContent" class="space-y-4 mb-6"></div>
            <button onclick="closeModal()" class="w-full bg-ab-border text-white font-black py-4 rounded-xl uppercase text-[10px] tracking-widest">Fechar</button>
        </div>
    </div>

    <div class="w-full max-w-4xl">
        <header class="flex flex-col items-center gap-6 mb-8 pb-6 border-b border-ab-border text-center">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-ab-cyan/10 rounded-xl text-ab-cyan border border-ab-cyan/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-white italic uppercase leading-none">AUDIOBASE <span class="font-light text-ab-cyan">PRO</span></h1>
                    <p class="text-[8px] text-slate-500 uppercase font-bold tracking-[0.3em] mt-1">Jaguaruana Engineering v12.0</p>
                </div>
            </div>
            <nav class="flex w-full max-w-xs justify-center gap-1 p-1 bg-ab-card rounded-full border border-ab-border">
                <button onclick="showTab('alinhamento')" id="btn-alinhamento" class="nav-btn flex-1 py-2.5 rounded-full font-black uppercase active">Delay</button>
                <button onclick="showTab('projeto')" id="btn-projeto" class="nav-btn flex-1 py-2.5 rounded-full font-black uppercase">Projeto</button>
                <button onclick="showTab('polaridade')" id="btn-polaridade" class="nav-btn flex-1 py-2.5 rounded-full font-black uppercase">Fase</button>
            </nav>
        </header>

        <div id="tab-alinhamento" class="tab-content space-y-6">
            <div class="bg-ab-card p-6 rounded-[2.5rem] border border-ab-border">
                <h2 class="text-lg font-bold text-white uppercase italic mb-6">Cálculo de Atraso (TA)</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                    <div class="p-4 bg-ab-bg rounded-2xl border border-ab-border">
                        <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Referência Longe (m)</label>
                        <input type="number" id="distL" value="5.00" oninput="runTA()" class="bg-transparent text-3xl font-black text-white w-full outline-none">
                    </div>
                    <div class="p-4 bg-ab-bg rounded-2xl border border-ab-border">
                        <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Referência Perto (m)</label>
                        <input type="number" id="distR" value="1.00" oninput="runTA()" class="bg-transparent text-3xl font-black text-white w-full outline-none">
                    </div>
                </div>
                <div class="bg-ab-bg p-8 rounded-[2rem] border border-ab-border text-center">
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">Valor para o DSP</p>
                    <div class="display-huge text-white italic"><span id="taValue">11.63</span><span class="text-sm text-ab-gold ml-1">ms</span></div>
                </div>
            </div>
        </div>

        <div id="tab-projeto" class="tab-content hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2 bg-ab-card p-6 rounded-[2.5rem] border border-ab-border">
                    <h2 class="text-lg font-bold text-white uppercase italic mb-6">Carga do Sistema</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-ab-bg rounded-xl border border-ab-border">
                            <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Qtd Falantes</label>
                            <input type="number" id="spkQty" value="2" oninput="runMasterCalc()" class="bg-transparent text-2xl font-black text-white w-full outline-none">
                        </div>
                        <div class="p-4 bg-ab-bg rounded-xl border border-ab-border">
                            <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Ohms Unit.</label>
                            <input type="number" id="spkImp" value="8" oninput="runMasterCalc()" class="bg-transparent text-2xl font-black text-white w-full outline-none">
                        </div>
                        <div class="col-span-2 p-4 bg-ab-bg rounded-xl border border-ab-border">
                            <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Watts RMS (Unit.)</label>
                            <input type="number" id="spkPwr" value="1600" oninput="runMasterCalc()" class="bg-transparent text-2xl font-black text-white w-full outline-none">
                        </div>
                    </div>
                </div>
                <div onclick="openReport()" class="bg-ab-card p-6 rounded-[2.5rem] border border-ab-border border-dashed flex flex-col justify-center items-center text-center cursor-pointer hover:border-ab-cyan transition-all">
                    <div id="verdictBox" class="text-[8px] font-black uppercase px-4 py-1.5 rounded-full mb-4 bg-ab-green/20 text-ab-green border border-ab-green/30">Análise</div>
                    <div class="display-vrms text-white mb-2"><span id="resVolts">0</span><span class="text-xs text-ab-cyan ml-1">V</span></div>
                    <p class="text-[8px] text-slate-600 font-bold uppercase tracking-widest">Relatório ➔</p>
                </div>
            </div>
        </div>

        <div id="tab-polaridade" class="tab-content hidden space-y-6">
            <div class="bg-ab-card p-6 rounded-[2.5rem] border border-ab-border text-center">
                <div id="micSelectorContainer" class="hidden mb-6 p-4 bg-ab-bg rounded-2xl border border-ab-purple/30">
                    <label class="text-[8px] font-black text-ab-purple uppercase block mb-2">Entrada de Áudio</label>
                    <select id="micSelect" onchange="changeMic(this.value)" class="w-full bg-transparent text-white font-bold text-[10px] uppercase outline-none"></select>
                </div>

                <div class="flex flex-col items-center gap-8">
                    <div id="statusCircle" class="w-48 h-48 rounded-full border-[10px] border-ab-bg flex flex-col items-center justify-center transition-all bg-black/20">
                        <div id="contentDefault" class="text-sm font-bold text-slate-700 uppercase italic">Aguardando</div>
                        <div id="resLabel" class="hidden">
                            <span id="symbol" class="text-7xl font-black italic"></span>
                            <span id="desc" class="text-[9px] font-black uppercase block mt-2"></span>
                        </div>
                    </div>
                    <button onclick="toggleApp()" id="btnAction" class="w-full bg-ab-purple text-white font-black py-5 rounded-2xl uppercase text-[11px] tracking-widest shadow-xl active:scale-95 transition-all">Ativar Scanner</button>
                    
                    <div class="w-full bg-ab-bg p-6 rounded-3xl border border-ab-border space-y-4">
                        <div class="flex justify-between items-center gap-4">
                            <div class="bg-ab-card px-4 py-2 rounded-xl border border-ab-border">
                                <input type="number" id="freqInput" value="60" oninput="manualFreq(this.value)" class="bg-transparent text-2xl font-black text-white w-16 outline-none text-right">
                                <span class="text-ab-cyan text-xs font-bold italic">Hz</span>
                            </div>
                            <button onclick="toggleTone()" id="btnTone" class="flex-1 bg-ab-cyan text-black py-4 rounded-xl text-[9px] font-black uppercase tracking-widest active:scale-95 transition-all">Iniciar Tom</button>
                        </div>
                        <input type="range" id="freqSlider" min="20" max="1000" value="60" oninput="sliderFreq(this.value)" class="w-full">
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center pb-8 opacity-20">
            <p class="text-[8px] font-black uppercase tracking-[0.4em]">v12.0 Final Build • Jaguaruana Engineering</p>
        </footer>
    </div>

    <script>
        let reportData = { status: "Aguardando", detail: "Insira os dados para análise." };
        let audioCtx, analyzer, dataArray, running=false, mediaStream, oscillator, isToneRunning=false, currentDeviceId=null;

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('active');
        }

        function runTA() {
            let L = parseFloat(document.getElementById('distL').value)||0, R = parseFloat(document.getElementById('distR').value)||0;
            document.getElementById('taValue').innerText = (Math.abs(R - L) / 0.344).toFixed(2);
        }

        function runMasterCalc() {
            let q = parseFloat(document.getElementById('spkQty').value)||1, i = parseFloat(document.getElementById('spkImp').value)||8, p = parseFloat(document.getElementById('spkPwr').value)||0;
            let fi = i/q, tp = p*q, vrms = Math.sqrt(tp*fi);
            document.getElementById('resVolts').innerText = vrms.toFixed(0);
            reportData = { status: "PROJETO CALCULADO", detail: `Impedância final de ${fi.toFixed(1)} Ohms com potência total de ${tp} Watts.` };
        }

        async function toggleApp() {
            if (running) { location.reload(); return; }
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                await updateMicList();
                analyzer = audioCtx.createAnalyser();
                let source = audioCtx.createMediaStreamSource(mediaStream);
                dataArray = new Float32Array(analyzer.fftSize);
                source.connect(analyzer);
                running = true;
                document.getElementById('btnAction').innerText = "Scanner Ativo";
                document.getElementById('btnAction').classList.replace('bg-ab-purple', 'bg-ab-red');
                process();
            } catch (e) { alert("Permita o microfone."); }
        }

        async function updateMicList() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const select = document.getElementById('micSelect');
            select.innerHTML = devices.filter(d => d.kind === 'audioinput').map(d => `<option value="${d.deviceId}">${d.label || 'Microfone'}</option>`).join('');
            document.getElementById('micSelectorContainer').classList.remove('hidden');
        }

        function process() {
            if (!running) return;
            analyzer.getFloatTimeDomainData(dataArray);
            let mv=0, mi=0; for(let i=0; i<dataArray.length; i++){ if(Math.abs(dataArray[i])>mv){ mv=Math.abs(dataArray[i]); mi=i; } }
            if (mv > 0.2) {
                const c=document.getElementById('statusCircle'), def=document.getElementById('contentDefault'), res=document.getElementById('resLabel'), sym=document.getElementById('symbol'), dsc=document.getElementById('desc');
                def.classList.add('hidden'); res.classList.remove('hidden');
                if (dataArray[mi] > 0) {
                    c.className="w-48 h-48 rounded-full border-[10px] flex flex-col items-center justify-center active-ring-pos bg-ab-green/5";
                    sym.innerText="+"; sym.className="text-7xl font-black text-ab-green italic"; dsc.innerText="Positiva"; dsc.className="text-ab-green font-black uppercase text-[10px]";
                } else {
                    c.className="w-48 h-48 rounded-full border-[10px] flex flex-col items-center justify-center active-ring-neg bg-ab-red/5";
                    sym.innerText="-"; sym.className="text-7xl font-black text-ab-red italic"; dsc.innerText="Negativa"; dsc.className="text-ab-red font-black uppercase text-[10px]";
                }
                setTimeout(() => { c.className="w-48 h-48 rounded-full border-[10px] border-ab-bg flex flex-col items-center justify-center bg-black/20"; def.classList.remove('hidden'); res.classList.add('hidden'); }, 1000);
            }
            requestAnimationFrame(process);
        }

        function toggleTone(){
            if(!audioCtx) audioCtx = new AudioContext();
            if(!isToneRunning){
                oscillator = audioCtx.createOscillator();
                oscillator.frequency.value = document.getElementById('freqInput').value;
                oscillator.connect(audioCtx.destination);
                oscillator.start();
                isToneRunning = true;
                document.getElementById('btnTone').innerText = "Parar";
                document.getElementById('btnTone').classList.replace('bg-ab-cyan', 'bg-ab-red');
            } else {
                oscillator.stop();
                isToneRunning = false;
                document.getElementById('btnTone').innerText = "Iniciar Tom";
                document.getElementById('btnTone').classList.replace('bg-ab-red', 'bg-ab-cyan');
            }
        }

        function sliderFreq(v){ document.getElementById('freqInput').value = v; if(isToneRunning) oscillator.frequency.value = v; }
        function manualFreq(v){ document.getElementById('freqSlider').value = v; if(isToneRunning) oscillator.frequency.value = v; }
        function openReport() { document.getElementById('reportContent').innerHTML = `<p class="text-white font-bold">${reportData.status}</p><p class="text-slate-400 text-xs mt-2">${reportData.detail}</p>`; document.getElementById('reportModal').classList.add('active'); }
        function closeModal() { document.getElementById('reportModal').classList.remove('active'); }
        window.onload = () => { runTA(); runMasterCalc(); };
    </script>
</body>
</html>
