<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIOBASE PRO</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0e14;
            --card-bg: #161b22;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --accent-orange: #ff9800;
            --accent-cyan: #00d2ff;
            --accent-purple: #a370f7;
            --accent-green: #44ff44;
            --card-border: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { text-align: center; margin: 60px 0 40px; }
        header h1 { font-size: 2.2rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        header h1 span { color: var(--accent-cyan); font-weight: 300; }
        header p { color: var(--text-dim); font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; margin-top: 10px; }

        .container {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 25px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: inherit;
            transition: 0.2s ease-in-out;
        }

        .card:hover { transform: translateY(-5px); border-color: #58a6ff66; background: #1c2128; }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: #0d1117;
            border: 1px solid var(--card-border);
            flex-shrink: 0;
        }

        .card-delay .icon-box { border-color: var(--accent-orange); color: var(--accent-orange); box-shadow: 0 0 15px #ff980022; }
        .card-projeto .icon-box { border-color: var(--accent-cyan); color: var(--accent-cyan); box-shadow: 0 0 15px #00d2ff22; }
        .card-fase .icon-box { border-color: var(--accent-purple); color: var(--accent-purple); box-shadow: 0 0 15px #a370f722; }
        .card-gerador .icon-box { border-color: var(--accent-green); color: var(--accent-green); box-shadow: 0 0 15px #44ff4422; }

        .info h2 { margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .card-delay h2 { color: var(--accent-orange); }
        .card-projeto h2 { color: var(--accent-cyan); }
        .card-fase h2 { color: var(--accent-purple); }
        .card-gerador h2 { color: var(--accent-green); }

        .info p { margin: 5px 0 0 0; color: var(--text-dim); font-size: 0.8rem; line-height: 1.3; }

        footer { margin-top: auto; padding: 40px 20px; color: var(--text-dim); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <h1>AUDIOBASE <span>PRO</span></h1>
        <p>V 1.0 • PWA READY</p>
    </header>

    <div class="container">
        <a href="delay.html" class="card card-delay">
            <div class="icon-box"><i class="fas fa-stopwatch"></i></div>
            <div class="info">
                <h2>Delay / TA</h2>
                <p>Alinhamento de tempo • Atraso entre vias</p>
            </div>
        </a>

        <a href="projeto.html" class="card card-projeto">
            <div class="icon-box"><i class="fas fa-microchip"></i></div>
            <div class="info">
                <h2>Projeto Sistema</h2>
                <p>Impedância • Vrms Limiter • Carga total</p>
            </div>
        </a>

        <a href="fase.html" class="card card-fase">
            <div class="icon-box"><i class="fas fa-wave-square"></i></div>
            <div class="info">
                <h2>Scanner de Fase</h2>
                <p>Polaridade real • Detecção 3 vias</p>
            </div>
        </a>

        <a href="gerador.html" class="card card-gerador">
            <div class="icon-box"><i class="fas fa-volume-up"></i></div>
            <div class="info">
                <h2>Gerador de Sinais</h2>
                <p>Ruído Rosa • Branco • Senoides</p>
            </div>
        </a>
    </div>
    
    <script>if ('serviceWorker' in navigator) {navigator.serviceWorker.register('sw.js');} </script>
    
    <footer>AUDIOBASE PRO • ENGINEERING SYSTEM</footer>
</body>
</html>
