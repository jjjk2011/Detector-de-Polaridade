<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AudioBase Pro | v11.9 Multi-Mic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'ab-bg': '#0a0d14', 'ab-card': '#161b22', 'ab-border': '#30363d', 'ab-cyan': '#06b6d4', 'ab-purple': '#a855f7', 'ab-green': '#22c55e', 'ab-gold': '#f59e0b', 'ab-red': '#ef4444' } } }
        }
    </script>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { background-color: #0a0d14; color: #c9d1d9; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); overflow-x: hidden; }
        
        .display-huge { font-size: clamp(3.5rem, 18vw, 7rem); line-height: 1; font-family: 'Courier New', monospace; font-weight: 900; }
        .display-vrms { font-size: clamp(2rem, 10vw, 4.5rem); line-height: 1; font-family: 'Courier New', monospace; font-weight: 900; }
        
        .nav-btn { transition: all 0.2s; cursor: pointer; white-space: nowrap; font-size: clamp(10px, 2.5vw, 12px); }
        .nav-btn.active { background-color: #06b6d4; color: #0a0d14; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        
        .active-ring-pos { border-color: #22c55e !important; box-shadow: 0 0 30px rgba(34, 197, 94, 0.2); background: rgba(34, 197, 94, 0.05); }
        .active-ring-neg { border-color: #ef4444 !important; box-shadow: 0 0 30px rgba(239, 68, 68, 0.2); background: rgba(239, 68, 68, 0.05); }

        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 6px; background: #30363d; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #06b6d4; margin-top: -7px; border: 2px solid #0a0d14; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="reportModal" class="modal" onclick="closeModal()">
        <div class="bg-ab-card w-full max-w-lg rounded-[2.5rem] border border-ab-border p-6 shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center border-b border-ab-border pb-4 mb-4">
                <h3 class="text-ab-cyan font-black uppercase italic tracking-widest text-sm">Relatório Técnico</h3>
                <button onclick="closeModal()" class="text-slate-500 text-2xl">&times;</button>
            </div>
            <div id="reportContent" class="space-y-4 mb-6"></div>
            <button onclick="closeModal()" class="w-full bg-ab-border text-white font-black py-4 rounded-xl uppercase text-[10px] tracking-widest">Fechar</button>
        </div>
    </div>

    <div class="w-full max-w-4xl">
        <header class="flex flex-col items-center gap-6 mb-8 pb-6 border-b border-ab-border">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-ab-cyan/10 rounded-xl text-ab-cyan border border-ab-cyan/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div class="text-center">
                    <h1 class="text-2xl font-black text-white italic tracking-tighter uppercase leading-none">AUDIOBASE <span class="font-light text-ab-cyan">PRO</span></h1>
                    <p class="text-[8px] text-slate-500 uppercase font-bold tracking-[0.3em] mt-1">Jaguaruana Engineering</p>
                </div>
            </div>
            
            <nav class="flex w-full max-w-xs justify-center gap-1 p-1 bg-ab-card rounded-full border border-ab-border">
                <button onclick="showTab('alinhamento')" id="btn-alinhamento" class="nav-btn flex-1 py-2.5 rounded-full font-black uppercase active">Delay</button>
                <button onclick="showTab('projeto')" id="btn-projeto" class="nav-btn flex-1 py-2.5 rounded-full font-black uppercase">Projeto</button>
                <button onclick="showTab('polaridade')" id="btn-polaridade" class="nav-btn flex-1 py-2.5 rounded-full font-black uppercase">Fase</button>
            </nav>
        </header>

        <div id="tab-alinhamento" class="tab-content space-y-6">
            <div class="bg-ab-card p-6 rounded-[2.5rem] border border-ab-border">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-2"><div class="w-1.5 h-5 bg-ab-gold rounded-full"></div><h2 class="text-lg font-bold text-white uppercase italic">Alinhamento</h2></div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                    <div class="p-4 bg-ab-bg rounded-2xl border border-ab-border">
                        <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Longe (m)</label>
                        <input type="number" id="distL" value="5.00" step="0.1" oninput="runTA()" class="bg-transparent text-3xl font-black text-white w-full outline-none">
                    </div>
                    <div class="p-4 bg-ab-bg rounded-2xl border border-ab-border">
                        <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Perto (m)</label>
                        <input type="number" id="distR" value="1.00" step="0.1" oninput="runTA()" class="bg-transparent text-3xl font-black text-white w-full outline-none">
                    </div>
                </div>
                <div class="bg-ab-bg p-8 rounded-[2rem] border border-ab-border text-center">
                    <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">Valor para o DSP</p>
                    <div class="flex items-baseline justify-center gap-1 leading-none">
                        <span id="taValue" class="display-huge text-white">11.63</span>
                        <span class="text-sm font-bold text-ab-gold italic">ms</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-projeto" class="tab-content hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2 bg-ab-card p-6 rounded-[2.5rem] border border-ab-border">
                    <h2 class="text-lg font-bold text-white uppercase italic mb-6">Carga por Canal</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-ab-bg rounded-xl border border-ab-border">
                            <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Qtd. Falantes</label>
                            <input type="number" id="spkQty" value="2" oninput="runMasterCalc()" class="bg-transparent text-2xl font-black text-white w-full outline-none">
                        </div>
                        <div class="p-4 bg-ab-bg rounded-xl border border-ab-border">
                            <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Ohms Unit.</label>
                            <input type="number" id="spkImp" value="8" oninput="runMasterCalc()" class="bg-transparent text-2xl font-black text-white w-full outline-none">
                        </div>
                    </div>
                    <select id="spkType" onchange="runMasterCalc()" class="w-full bg-ab-bg border border-ab-border p-4 rounded-xl text-white font-black text-[10px] mt-4 uppercase outline-none">
                        <option value="paralelo">Ligação em Paralelo</option>
                        <option value="serie">Ligação em Série</option>
                    </select>
                </div>
                <div onclick="openReport()" class="bg-ab-card p-6 rounded-[2.5rem] border border-ab-border border-dashed flex flex-col justify-center items-center text-center cursor-pointer">
                    <div id="verdictBox" class="text-[8px] font-black uppercase px-4 py-1.5 rounded-full mb-4 bg-ab-green/20 text-ab-green">Sistema Seguro</div>
                    <div class="display-vrms text-white mb-4"><span id="resVolts">0</span><span class="text-xs text-ab-cyan ml-1">V</span></div>
                    <p class="text-[8px] text-slate-600 font-bold uppercase">Ver Relatório ➔</p>
                </div>
            </div>
        </div>

        <div id="tab-polaridade" class="tab-content hidden space-y-6">
            <div class="bg-ab-card p-6 rounded-[2.5rem] border border-ab-border text-center">
                <h2 class="text-lg font-bold text-white uppercase italic mb-8">Scanner de Fase</h2>
                
                <div id="micSelectorContainer" class="hidden mb-6 animate-pulse">
                    <label class="text-[8px] font-black text-ab-purple uppercase block mb-2 tracking-[0.2em]">Entrada de Áudio Ativa</label>
                    <select id="micSelect" onchange="changeMic(this.value)" class="w-full bg-ab-bg border border-ab-purple/30 p-4 rounded-xl text-white font-bold text-[10px] uppercase outline-none focus:border-ab-purple">
                        <option value="">Carregando dispositivos...</option>
                    </select>
                </div>

                <div class="flex flex-col items-center gap-8">
                    <div id="statusCircle" class="w-48 h-48 rounded-full border-[10px] border-ab-bg flex flex-col items-center justify-center transition-all bg-black/20">
                        <div id="contentDefault" class="text-sm font-bold text-slate-700 uppercase italic">Standby</div>
                        <div id="resLabel" class="hidden">
                            <span id="symbol" class="text-7xl font-black italic"></span>
                            <span id="desc" class="text-[9px] font-black uppercase block mt-2"></span>
                        </div>
                    </div>

                    <div class="w-full space-y-5">
                        <button onclick="toggleApp(event)" id="btnAction" class="w-full bg-ab-purple text-white font-black py-5 rounded-2xl uppercase text-[11px] tracking-widest shadow-xl">Ativar Scanner</button>
                        
                        <div class="bg-ab-bg p-5 rounded-3xl border border-ab-border flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <button onclick="toggleSignal()" class="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center">
                                    <svg id="playIcon" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                </button>
                                <div class="text-left"><p class="text-[10px] font-black uppercase text-white">Pulso de Teste</p></div>
                            </div>
                            <audio id="signalAudio" loop src="AudioBase_Polaridade_Intervalado_500ms.wav"></audio>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center pb-8 opacity-40">
            <p class="text-[8px] font-black uppercase tracking-[0.4em]">v11.9 MULTI-MIC • Jaguaruana Engineering</p>
        </footer>
    </div>

    <script>
        let reportData = { status: "", detail: "" };
        let audioCtx, analyzer, source, dataArray, running=false, phaseInverted=true, timeout, oscillator, isToneRunning=false, mediaStream;
        let threshold = 0.25, noiseFloor = 0;
        let currentDeviceId = null;

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('active');
        }

        async function updateMicList() {
            const select = document.getElementById('micSelect');
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const audioInputs = devices.filter(device => device.kind === 'audioinput');
                
                select.innerHTML = '';
                audioInputs.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Microfone ${index + 1}`;
                    if(device.deviceId === currentDeviceId) option.selected = true;
                    select.appendChild(option);
                });
                
                document.getElementById('micSelectorContainer').classList.remove('hidden');
            } catch (err) {
                console.error("Erro ao listar microfones", err);
            }
        }

        async function changeMic(id) {
            currentDeviceId = id;
            if(running) {
                // Reinicia o stream com o novo mic
                running = false;
                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                setTimeout(() => toggleApp(), 200);
            }
        }

        async function toggleApp(e) {
            if (e) e.preventDefault();
            if (running) { 
                running = false;
                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                document.getElementById('btnAction').innerText = "Ativar Scanner";
                document.getElementById('btnAction').classList.replace('bg-ab-red', 'bg-ab-purple');
                document.getElementById('micSelectorContainer').classList.add('hidden');
                return; 
            }
            
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            
            try {
                const constraints = {
                    audio: {
                        deviceId: currentDeviceId ? { exact: currentDeviceId } : undefined,
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                };

                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // Após pegar a permissão, atualiza a lista de nomes dos mics (que agora aparecem)
                await updateMicList();

                analyzer = audioCtx.createAnalyser();
                source = audioCtx.createMediaStreamSource(mediaStream);
                dataArray = new Float32Array(analyzer.fftSize);
                source.connect(analyzer);
                running = true;
                
                document.getElementById('btnAction').innerText = "Calibrando Sensibilidade...";
                
                setTimeout(() => {
                    analyzer.getFloatTimeDomainData(dataArray);
                    let sum = 0; for(let i=0; i<dataArray.length; i++) sum += Math.abs(dataArray[i]);
                    noiseFloor = sum / dataArray.length;
                    threshold = Math.max(0.12, noiseFloor * 12); 
                    document.getElementById('btnAction').innerText = "Parar Scanner";
                    document.getElementById('btnAction').classList.replace('bg-ab-purple', 'bg-ab-red');
                    process();
                }, 600);
            } catch (err) { 
                alert("Erro: Verifique se o microfone está conectado ou se deu permissão."); 
            }
        }

        function process() {
            if (!running) return;
            analyzer.getFloatTimeDomainData(dataArray);
            let mv=0, mi=0; for(let i=0;i<dataArray.length;i++){ if(Math.abs(dataArray[i])>mv){mv=Math.abs(dataArray[i]); mi=i;}}
            if (mv > threshold) {
                clearTimeout(timeout);
                let peak = dataArray[mi] * (phaseInverted ? -1 : 1);
                const c=document.getElementById('statusCircle'), def=document.getElementById('contentDefault'), res=document.getElementById('resLabel'), sym=document.getElementById('symbol'), dsc=document.getElementById('desc');
                def.classList.add('hidden'); res.classList.remove('hidden');
                if (peak > 0) {
                    c.className="w-48 h-48 rounded-full border-[10px] flex flex-col items-center justify-center active-ring-pos bg-ab-green/5";
                    sym.innerText="+"; sym.className="text-7xl font-black text-ab-green italic leading-none"; dsc.innerText="Positiva"; dsc.className="text-ab-green font-black uppercase text-[10px] pt-4";
                } else {
                    c.className="w-48 h-48 rounded-full border-[10px] flex flex-col items-center justify-center active-ring-neg bg-ab-red/5";
                    sym.innerText="-"; sym.className="text-7xl font-black text-ab-red italic leading-none"; dsc.innerText="Negativa"; dsc.className="text-ab-red font-black uppercase text-[10px] pt-4";
                }
                timeout = setTimeout(() => { c.className="w-48 h-48 rounded-full border-[10px] border-ab-bg flex flex-col items-center justify-center bg-black/20"; def.classList.remove('hidden'); res.classList.add('hidden'); }, 1200);
            }
            requestAnimationFrame(process);
        }

        function toggleSignal(){ let a=document.getElementById('signalAudio'); if(a.paused){ a.play(); document.getElementById('playIcon').innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';} else { a.pause(); document.getElementById('playIcon').innerHTML='<path d="M8 5v14l11-7z"/>';}}
        function runTA() { /* ... lógica de delay ... */ }
        function runMasterCalc() { /* ... lógica de projeto ... */ }
        window.onload = () => { runTA(); runMasterCalc(); };
    </script>
</body>
</html>
