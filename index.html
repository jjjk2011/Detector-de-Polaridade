<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AudioBase Pro + Generator</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0d14">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'ab-dark': '#0a0d14', 'ab-card': '#161b22', 'ab-border': '#30363d', 'ab-cyan': '#06b6d4' } } }
        }
    </script>
    <style>
        body { background-color: #0a0d14; color: #c9d1d9; font-family: sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .active-ring-pos { border-color: #22c55e !important; box-shadow: 0 0 40px rgba(34, 197, 94, 0.2); background: rgba(34, 197, 94, 0.05); }
        .active-ring-neg { border-color: #ef4444 !important; box-shadow: 0 0 40px rgba(239, 68, 68, 0.2); background: rgba(239, 68, 68, 0.05); }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #30363d; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #06b6d4; margin-top: -6px; }
        .shadow-glow { box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-5xl w-full">
        <header class="flex items-center justify-between mb-8 pb-4 border-b border-ab-border">
            <div class="flex items-center gap-4">
                <div class="p-2.5 bg-ab-cyan/10 rounded-xl text-ab-cyan">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold text-white">AudioBase Pro</h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest">Polarity & Tone Gen</p>
                </div>
            </div>
            <button type="button" onclick="togglePhase()" id="phaseIndicator" class="px-3 py-1 bg-slate-800 rounded-full text-[10px] font-bold text-orange-400 border border-slate-700">FASE: INVERTIDA (HW)</button>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-6">
                <section class="bg-ab-card p-6 rounded-[2rem] border border-ab-border shadow-xl">
                    <h2 class="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-ab-cyan" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                        Fonte de Sinal (Pulso)
                    </h2>
                    <div class="bg-ab-dark p-4 rounded-2xl border border-ab-border flex items-center gap-4">
                        <button type="button" id="btnPlay" onclick="toggleSignal()" class="w-12 h-12 flex-shrink-0 bg-white text-ab-dark rounded-full flex items-center justify-center hover:bg-ab-cyan transition-colors">
                            <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <div class="flex-1">
                            <p class="text-[11px] font-bold text-white uppercase">Pulso 500ms</p>
                            <p class="text-[9px] text-slate-500 uppercase">AudioBase Pattern</p>
                        </div>
                        <audio id="signalAudio" loop src="AudioBase_Polaridade_Intervalado_500ms.wav"></audio>
                    </div>
                </section>

                <section class="bg-ab-card p-6 rounded-[2rem] border border-ab-border shadow-xl">
                    <h2 class="text-lg font-semibold text-white mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-ab-cyan" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 19V5l12 7-12 7z"/></svg>
                        Gerador de Frequência
                    </h2>
                    <div class="space-y-5">
                        <div class="flex justify-between items-end">
                            <span id="freqValue" class="text-3xl font-black text-white">440<span class="text-ab-cyan text-sm ml-1">Hz</span></span>
                            <button type="button" id="btnTone" onclick="toggleTone()" class="bg-ab-cyan text-ab-dark px-6 py-2 rounded-xl font-bold text-xs uppercase tracking-widest">Iniciar Tom</button>
                        </div>
                        <input type="range" id="freqSlider" min="20" max="20000" step="1" value="440" class="w-full" oninput="updateFreq(this.value)">
                        <div class="flex justify-between text-[9px] text-slate-600 font-bold uppercase tracking-widest">
                            <span>20Hz (Sub)</span>
                            <span>20kHz (High)</span>
                        </div>
                    </div>
                </section>

                <section class="bg-ab-card p-6 rounded-[2rem] border border-ab-border shadow-xl">
                    <h2 class="text-lg font-semibold text-white mb-6">Captura</h2>
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold text-slate-500 uppercase">Dispositivo</label>
                            <select id="micSelect" class="w-full bg-ab-dark border border-ab-border p-4 rounded-2xl text-sm outline-none appearance-none text-white cursor-pointer"></select>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between text-[11px] font-bold text-slate-500 uppercase">
                                <label>Sensibilidade</label>
                                <span id="sensValue" class="text-ab-cyan font-mono">0.25</span>
                            </div>
                            <input type="range" id="sensSlider" min="0.05" max="0.80" step="0.01" value="0.25" class="w-full" oninput="updateSens(this.value)">
                        </div>
                        <button type="button" id="btnAction" onclick="toggleApp(event)" class="w-full bg-ab-cyan hover:bg-cyan-500 text-ab-dark font-black py-5 rounded-2xl transition-all uppercase tracking-widest text-xs shadow-glow">Ativar Scanner</button>
                    </div>
                </section>
            </div>

            <section class="bg-ab-card p-6 rounded-[2rem] border border-ab-border shadow-xl flex flex-col items-center justify-between min-h-[450px]">
                <h2 class="text-lg font-semibold text-white w-full">Resultado</h2>
                <div id="statusCircle" class="w-64 h-64 rounded-full border-[14px] border-ab-dark flex items-center justify-center transition-all duration-200">
                    <div id="contentDefault" class="text-6xl font-black text-slate-800">--</div>
                    <div id="resLabel" class="hidden text-center">
                        <span id="symbol" class="text-8xl font-black block"></span>
                        <span id="desc" class="text-[11px] font-black uppercase tracking-[0.3em] mt-2 block"></span>
                    </div>
                </div>
                <div class="w-full px-4">
                    <div class="flex justify-between text-[10px] mb-2 font-black text-slate-500 uppercase">
                        <span>Input Level</span> <span id="rmsNum">0%</span>
                    </div>
                    <div class="w-full bg-ab-dark h-2 rounded-full overflow-hidden border border-ab-border">
                        <div id="levelBar" class="bg-ab-cyan h-full w-0 transition-all duration-75"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }

        let audioCtx, analyzer, source, dataArray, running = false, phaseInverted = true, threshold = 0.25, timeout;
        let oscillator, gainNode, isToneRunning = false;
        const audioPlayer = document.getElementById('signalAudio');

        function updateSens(v) { threshold = parseFloat(v); document.getElementById('sensValue').innerText = v; }
        
        function updateFreq(v) {
            document.getElementById('freqValue').innerHTML = `${v}<span class="text-ab-cyan text-sm ml-1">Hz</span>`;
            if (oscillator) oscillator.frequency.setTargetAtTime(v, audioCtx.currentTime, 0.01);
        }

        function togglePhase() { 
            phaseInverted = !phaseInverted; 
            const ind = document.getElementById('phaseIndicator');
            ind.innerText = phaseInverted ? 'FASE: INVERTIDA (HW)' : 'FASE: NORMAL';
            ind.style.color = phaseInverted ? '#fb923c' : '#06b6d4';
        }

        function toggleSignal() {
            if (audioPlayer.paused) {
                audioPlayer.play();
                document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            } else {
                audioPlayer.pause();
                document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
            }
        }

        function toggleTone() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (!isToneRunning) {
                oscillator = audioCtx.createOscillator();
                gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(document.getElementById('freqSlider').value, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                isToneRunning = true;
                document.getElementById('btnTone').innerText = "Parar Tom";
                document.getElementById('btnTone').classList.replace('bg-ab-cyan', 'bg-red-600');
            } else {
                oscillator.stop();
                isToneRunning = false;
                document.getElementById('btnTone').innerText = "Iniciar Tom";
                document.getElementById('btnTone').classList.replace('bg-red-600', 'bg-ab-cyan');
            }
        }

        async function initMics() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const select = document.getElementById('micSelect');
                select.innerHTML = '';
                devices.filter(d => d.kind === 'audioinput').forEach(d => select.add(new Option(d.label || `Mic ${select.length+1}`, d.deviceId)));
                stream.getTracks().forEach(t => t.stop());
            } catch (e) { console.error("Mic Error"); }
        }

        async function toggleApp(e) {
            e.preventDefault();
            if (running) { location.reload(); return; }
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { deviceId: document.getElementById('micSelect').value ? { exact: document.getElementById('micSelect').value } : undefined,
                echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
            });

            analyzer = audioCtx.createAnalyser();
            source = audioCtx.createMediaStreamSource(stream);
            analyzer.fftSize = 2048;
            dataArray = new Float32Array(analyzer.fftSize);
            source.connect(analyzer);
            running = true;
            document.getElementById('btnAction').innerText = "Parar Scanner";
            document.getElementById('btnAction').className = "w-full bg-red-600 text-white font-black py-5 rounded-2xl transition-all uppercase tracking-widest text-xs";
            process();
        }

        function process() {
            if (!running) return;
            analyzer.getFloatTimeDomainData(dataArray);
            let maxV = 0, maxI = 0, sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i] * dataArray[i];
                if (Math.abs(dataArray[i]) > maxV) { maxV = Math.abs(dataArray[i]); maxI = i; }
            }
            const rms = Math.sqrt(sum / dataArray.length);
            document.getElementById('levelBar').style.width = Math.min(rms * 600, 100) + "%";
            document.getElementById('rmsNum').innerText = Math.floor(Math.min(rms * 600, 100)) + "%";

            if (maxV > threshold) {
                clearTimeout(timeout);
                let peak = dataArray[maxI]; if (phaseInverted) peak *= -1;
                const circle = document.getElementById('statusCircle'), def = document.getElementById('contentDefault'), res = document.getElementById('resLabel'), sym = document.getElementById('symbol'), dsc = document.getElementById('desc');
                def.classList.add('hidden'); res.classList.remove('hidden');
                if (peak > 0) {
                    circle.className = "w-64 h-64 rounded-full border-[14px] flex items-center justify-center transition-all duration-75 active-ring-pos";
                    sym.innerText = "+"; sym.className = "text-8xl font-black block text-green-500";
                    dsc.innerText = "Positiva"; dsc.className = "text-[11px] font-black uppercase text-green-500 mt-2 block";
                } else {
                    circle.className = "w-64 h-64 rounded-full border-[14px] flex items-center justify-center transition-all duration-75 active-ring-neg";
                    sym.innerText = "-"; sym.className = "text-8xl font-black block text-red-500";
                    dsc.innerText = "Negativa"; dsc.className = "text-[11px] font-black uppercase text-red-500 mt-2 block";
                }
                timeout = setTimeout(() => { 
                    circle.className = "w-64 h-64 rounded-full border-[14px] border-ab-dark flex items-center justify-center transition-all duration-500"; 
                    def.classList.remove('hidden'); res.classList.add('hidden'); 
                }, 1200);
            }
            requestAnimationFrame(process);
        }
        window.onload = initMics;
    </script>
</body>
</html>
