<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AudioBase Pro - Master Suite</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0d14">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'ab-dark': '#0a0d14', 'ab-card': '#161b22', 'ab-border': '#30363d', 'ab-cyan': '#06b6d4' } } }
        }
    </script>
    <style>
        body { background-color: #0a0d14; color: #c9d1d9; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-ring-pos { border-color: #22c55e !important; box-shadow: 0 0 40px rgba(34, 197, 94, 0.2); background: rgba(34, 197, 94, 0.05); }
        .active-ring-neg { border-color: #ef4444 !important; box-shadow: 0 0 40px rgba(239, 68, 68, 0.2); background: rgba(239, 68, 68, 0.05); }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #30363d; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #06b6d4; margin-top: -6px; }
        .nav-btn.active { border-bottom: 3px solid #06b6d4; color: white; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="max-w-5xl w-full">
        <header class="flex flex-col md:flex-row items-center justify-between mb-8 pb-4 border-b border-ab-border gap-4">
            <div class="flex items-center gap-4">
                <div class="p-2.5 bg-ab-cyan/10 rounded-xl text-ab-cyan">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold text-white">AudioBase Pro</h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-[0.3em]">Master Technical Suite</p>
                </div>
            </div>
            
            <nav class="flex gap-6 text-[11px] font-bold uppercase tracking-widest text-slate-500">
                <button onclick="showTab('impedancia')" id="btn-impedancia" class="nav-btn py-2 active">Impedância</button>
                <button onclick="showTab('polaridade')" id="btn-polaridade" class="nav-btn py-2">Polaridade</button>
            </nav>
        </header>

        <div id="tab-impedancia" class="tab-content space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <section class="md:col-span-2 bg-ab-card p-6 rounded-[2rem] border border-ab-border shadow-xl space-y-6">
                    <h2 class="text-lg font-semibold text-white">Configuração Simples</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold text-slate-500 uppercase">Quantidade de Falantes</label>
                            <input type="number" id="impQty" value="2" oninput="calcImpedancia()" class="w-full bg-ab-dark border border-ab-border p-4 rounded-2xl text-white outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold text-slate-500 uppercase">Impedância Unitária (Ω)</label>
                            <input type="number" id="impUnit" value="4" oninput="calcImpedancia()" class="w-full bg-ab-dark border border-ab-border p-4 rounded-2xl text-white outline-none">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-500 uppercase">Tipo de Ligação</label>
                        <select id="impType" onchange="calcImpedancia()" class="w-full bg-ab-dark border border-ab-border p-4 rounded-2xl text-white outline-none appearance-none">
                            <option value="paralelo">Paralelo (Divide Ω)</option>
                            <option value="serie">Série (Soma Ω)</option>
                        </select>
                    </div>
                    
                    <div class="bg-ab-dark/50 border border-ab-cyan/30 rounded-3xl p-8 text-center">
                        <span id="impResult" class="text-7xl font-black text-ab-cyan tracking-tighter">2.00Ω</span>
                        <p id="impSummary" class="text-xs text-slate-500 mt-4 uppercase font-bold tracking-widest">Você ligou 2 falantes de 4Ω em Paralelo</p>
                    </div>
                </section>

                <aside class="bg-ab-card p-6 rounded-[2rem] border border-ab-border shadow-xl">
                    <h2 class="text-sm font-bold text-slate-400 uppercase mb-4 tracking-widest">Referência Rápida</h2>
                    <div class="space-y-3">
                        <div class="flex justify-between p-3 bg-ab-dark rounded-xl border border-ab-border text-[11px]">
                            <span class="text-slate-400 italic">2x 4Ω</span> <span class="text-ab-cyan font-bold">2Ω Par. / 8Ω Ser.</span>
                        </div>
                        <div class="flex justify-between p-3 bg-ab-dark rounded-xl border border-ab-border text-[11px]">
                            <span class="text-slate-400 italic">4x 4Ω</span> <span class="text-ab-cyan font-bold">1Ω Par. / 16Ω Ser.</span>
                        </div>
                        <div class="flex justify-between p-3 bg-ab-dark rounded-xl border border-ab-border text-[11px]">
                            <span class="text-slate-400 italic">2x 2Ω</span> <span class="text-ab-cyan font-bold">1Ω Par. / 4Ω Ser.</span>
                        </div>
                    </div>
                </aside>
            </div>
        </div>

        <div id="tab-polaridade" class="tab-content hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <section class="bg-ab-card p-6 rounded-[2rem] border border-ab-border space-y-6">
                    <h2 class="text-lg font-semibold text-white">Sinais & Tons</h2>
                    <div class="bg-ab-dark p-4 rounded-2xl border border-ab-border flex items-center gap-4">
                        <button onclick="toggleSignal()" class="w-12 h-12 bg-white text-ab-dark rounded-full flex items-center justify-center">
                            <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <div class="flex-1">
                            <p class="text-[11px] font-bold text-white uppercase">Pulso de Polaridade</p>
                            <p class="text-[9px] text-slate-500 uppercase">AudioBase Pattern</p>
                        </div>
                        <audio id="signalAudio" loop src="AudioBase_Polaridade_Intervalado_500ms.wav"></audio>
                    </div>
                    <div class="bg-ab-dark p-6 rounded-2xl border border-ab-border space-y-4">
                        <div class="flex justify-between items-end">
                            <span id="freqValue" class="text-3xl font-black text-white">440<span class="text-ab-cyan text-sm ml-1">Hz</span></span>
                            <button onclick="toggleTone()" id="btnTone" class="bg-ab-cyan text-ab-dark px-6 py-2 rounded-xl font-bold text-[10px] uppercase">Iniciar Tom</button>
                        </div>
                        <input type="range" id="freqSlider" min="20" max="20000" step="1" value="440" class="w-full" oninput="updateFreq(this.value)">
                    </div>
                </section>

                <section class="bg-ab-card p-6 rounded-[2rem] border border-ab-border flex flex-col items-center justify-between min-h-[400px]">
                    <div class="flex justify-between w-full">
                         <h2 class="text-lg font-semibold text-white">Scanner</h2>
                         <button onclick="togglePhase()" id="phaseIndicator" class="px-2 py-1 bg-slate-800 rounded-full text-[9px] font-bold text-orange-400 border border-slate-700">FASE: INVERTIDA (HW)</button>
                    </div>
                    <div id="statusCircle" class="w-56 h-56 rounded-full border-[12px] border-ab-dark flex items-center justify-center transition-all duration-200">
                        <div id="contentDefault" class="text-5xl font-black text-slate-800">--</div>
                        <div id="resLabel" class="hidden text-center">
                            <span id="symbol" class="text-7xl font-black block"></span>
                            <span id="desc" class="text-[10px] font-black uppercase tracking-widest mt-2 block"></span>
                        </div>
                    </div>
                    <button onclick="toggleApp(event)" id="btnAction" class="w-full bg-ab-cyan text-ab-dark font-black py-4 rounded-2xl uppercase tracking-widest text-[10px]">Ativar Microfone</button>
                </section>
            </div>
        </div>
    </div>

    <script>
        // LÓGICA DE NAVEGAÇÃO
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        // LÓGICA IMPEDÂNCIA
        function calcImpedancia() {
            const qty = parseFloat(document.getElementById('impQty').value) || 0;
            const unit = parseFloat(document.getElementById('impUnit').value) || 0;
            const type = document.getElementById('impType').value;
            let result = 0;

            if (qty > 0 && unit > 0) {
                if (type === 'paralelo') {
                    result = unit / qty;
                } else {
                    result = unit * qty;
                }
            }

            document.getElementById('impResult').innerText = result.toFixed(2) + "Ω";
            document.getElementById('impSummary').innerText = `Você ligou ${qty} falantes de ${unit}Ω em ${type === 'paralelo' ? 'Paralelo' : 'Série'}`;
        }

        // --- MANTER AS FUNÇÕES ANTERIORES DO SCANNER (toggleApp, process, etc) ---
        // (Vou resumir para caber, mas você já tem elas rodando 100%)
        let audioCtx, analyzer, source, dataArray, running = false, phaseInverted = true, threshold = 0.25;
        let oscillator, isToneRunning = false;
        const audioPlayer = document.getElementById('signalAudio');

        function togglePhase() { 
            phaseInverted = !phaseInverted; 
            document.getElementById('phaseIndicator').innerText = phaseInverted ? 'FASE: INVERTIDA (HW)' : 'FASE: NORMAL';
            document.getElementById('phaseIndicator').classList.toggle('text-orange-400');
        }

        function updateFreq(v) {
            document.getElementById('freqValue').innerHTML = `${v}<span class="text-ab-cyan text-sm ml-1">Hz</span>`;
            if (oscillator) oscillator.frequency.setTargetAtTime(v, audioCtx.currentTime, 0.01);
        }

        function toggleTone() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (!isToneRunning) {
                oscillator = audioCtx.createOscillator();
                oscillator.frequency.value = document.getElementById('freqSlider').value;
                oscillator.connect(audioCtx.destination);
                oscillator.start();
                isToneRunning = true;
                document.getElementById('btnTone').innerText = "Parar Tom";
            } else {
                oscillator.stop();
                isToneRunning = false;
                document.getElementById('btnTone').innerText = "Iniciar Tom";
            }
        }

        async function toggleApp(e) {
            e.preventDefault();
            if (running) { location.reload(); return; }
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            analyzer = audioCtx.createAnalyser();
            source = audioCtx.createMediaStreamSource(stream);
            dataArray = new Float32Array(analyzer.fftSize);
            source.connect(analyzer);
            running = true;
            document.getElementById('btnAction').innerText = "PARAR SCANNER";
            process();
        }

        function process() {
            if (!running) return;
            analyzer.getFloatTimeDomainData(dataArray);
            let maxV = 0, maxI = 0;
            for (let i = 0; i < dataArray.length; i++) {
                if (Math.abs(dataArray[i]) > maxV) { maxV = Math.abs(dataArray[i]); maxI = i; }
            }
            if (maxV > 0.25) {
                let peak = dataArray[maxI] * (phaseInverted ? -1 : 1);
                const circle = document.getElementById('statusCircle'), def = document.getElementById('contentDefault'), res = document.getElementById('resLabel'), sym = document.getElementById('symbol'), dsc = document.getElementById('desc');
                def.classList.add('hidden'); res.classList.remove('hidden');
                if (peak > 0) {
                    circle.className = "w-56 h-56 rounded-full border-[12px] flex items-center justify-center active-ring-pos";
                    sym.innerText = "+"; dsc.innerText = "Positiva";
                } else {
                    circle.className = "w-56 h-56 rounded-full border-[12px] flex items-center justify-center active-ring-neg";
                    sym.innerText = "-"; dsc.innerText = "Negativa";
                }
                setTimeout(() => { circle.className = "w-56 h-56 rounded-full border-[12px] border-ab-dark flex items-center justify-center"; def.classList.remove('hidden'); res.classList.add('hidden'); }, 1000);
            }
            requestAnimationFrame(process);
        }
        function toggleSignal() { audioPlayer.paused ? audioPlayer.play() : audioPlayer.pause(); }
    </script>
</body>
</html>
