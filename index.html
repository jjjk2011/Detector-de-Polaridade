<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AudioBase Pro | v12.5 Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'ab-bg': '#0a0d14', 'ab-card': '#161b22', 'ab-border': '#30363d', 'ab-cyan': '#06b6d4', 'ab-purple': '#a855f7', 'ab-green': '#22c55e', 'ab-gold': '#f59e0b', 'ab-red': '#ef4444' } } }
        }
    </script>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { background-color: #0a0d14; color: #c9d1d9; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); overflow-x: hidden; }
        .display-huge { font-size: clamp(3.5rem, 18vw, 7rem); line-height: 1; font-family: 'Courier New', monospace; font-weight: 900; }
        .nav-btn { transition: all 0.2s; cursor: pointer; white-space: nowrap; font-size: clamp(10px, 2.5vw, 12px); border: 1px solid #30363d; }
        .nav-btn.active { background-color: #06b6d4; color: #0a0d14; border-color: #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="reportModal" class="modal" onclick="closeModal()">
        <div class="bg-ab-card w-full max-w-lg rounded-[2.5rem] border border-ab-border p-8 shadow-2xl" onclick="event.stopPropagation()">
            <h3 id="modalTag" class="text-ab-cyan font-black uppercase italic tracking-widest text-[10px] mb-6">RELATÓRIO TÉCNICO</h3>
            <div id="reportContent" class="space-y-4 mb-8"></div>
            <button onclick="closeModal()" class="w-full bg-ab-border text-white font-black py-5 rounded-2xl uppercase text-[11px] tracking-widest">FECHAR</button>
        </div>
    </div>

    <div class="w-full max-w-4xl">
        <header class="flex justify-center mb-10">
            <nav class="flex w-full max-w-xs justify-center gap-1.5 p-1 bg-ab-card rounded-full border border-ab-border">
                <button onclick="showTab('alinhamento')" id="btn-alinhamento" class="nav-btn flex-1 py-3 rounded-full font-black uppercase">DELAY</button>
                <button onclick="showTab('projeto')" id="btn-projeto" class="nav-btn flex-1 py-3 rounded-full font-black uppercase active">PROJETO</button>
                <button onclick="showTab('polaridade')" id="btn-polaridade" class="nav-btn flex-1 py-3 rounded-full font-black uppercase">FASE</button>
            </nav>
        </header>

        <div id="tab-projeto" class="tab-content space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-ab-card p-6 rounded-[2.5rem] border border-ab-border space-y-4">
                    <h2 class="text-[10px] font-black text-white uppercase italic flex items-center gap-2">
                        <span class="w-1.5 h-4 bg-ab-cyan rounded-full"></span> ENTRADA DE DADOS
                    </h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="p-3 bg-ab-bg rounded-xl border border-ab-border">
                            <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Qtd Falantes</label>
                            <input type="number" id="spkQty" value="8" oninput="runCalc()" class="bg-transparent text-2xl font-black text-white w-full outline-none">
                        </div>
                        <div class="p-3 bg-ab-bg rounded-xl border border-ab-border">
                            <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Ω Unidade</label>
                            <input type="number" id="spkImp" value="8" oninput="runCalc()" class="bg-transparent text-2xl font-black text-white w-full outline-none">
                        </div>
                    </div>
                    <div class="p-3 bg-ab-bg rounded-xl border border-ab-border">
                        <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Watts RMS Unidade</label>
                        <input type="number" id="spkPwr" value="600" oninput="runCalc()" class="bg-transparent text-2xl font-black text-white w-full outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-4 border-t border-ab-border">
                        <div class="p-3 bg-ab-bg rounded-xl border border-ab-border">
                            <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Amp Canal (W)</label>
                            <input type="number" id="ampPwr" value="10000" oninput="runCalc()" class="bg-transparent text-xl font-black text-white w-full outline-none">
                        </div>
                        <div class="p-3 bg-ab-bg rounded-xl border border-ab-border">
                            <label class="text-[8px] font-bold text-slate-500 uppercase block mb-1">Amp Mínimo (Ω)</label>
                            <input type="number" id="ampImpMin" value="1" oninput="runCalc()" class="bg-transparent text-xl font-black text-white w-full outline-none">
                        </div>
                    </div>
                </div>

                <div class="bg-ab-card p-6 rounded-[2.5rem] border border-ab-border flex flex-col justify-between">
                    <div id="statusBadge" onclick="openReport()" class="text-center py-2.5 rounded-full font-black text-[9px] uppercase tracking-widest border mb-6 cursor-pointer">
                        CARREGANDO...
                    </div>
                    <div class="space-y-4">
                        <div class="flex justify-between border-b border-ab-border pb-2">
                            <span class="text-[9px] font-black text-slate-500 uppercase">Impedância Final</span>
                            <span class="text-xl font-black text-white"><span id="resImp">1.0</span> Ω</span>
                        </div>
                        <div class="flex justify-between border-b border-ab-border pb-2">
                            <span class="text-[9px] font-black text-slate-500 uppercase">Potência Exigida</span>
                            <span class="text-xl font-black text-white"><span id="resTotalPwr">4800</span> W</span>
                        </div>
                    </div>
                    <div class="mt-8 p-6 bg-ab-bg rounded-[2rem] border border-ab-border text-center">
                        <p class="text-[9px] font-black text-ab-cyan uppercase tracking-widest mb-1">Vrms (LIMITER)</p>
                        <div class="flex items-baseline justify-center gap-1">
                            <span id="resVolts" class="text-6xl font-black text-white italic">69</span>
                            <span class="text-2xl font-black text-white italic">V</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-alinhamento" class="tab-content hidden">
            <div class="bg-ab-card p-8 rounded-[2.5rem] border border-ab-border max-w-lg mx-auto space-y-6">
                <div class="p-5 bg-ab-bg rounded-2xl border border-ab-border">
                    <label class="text-[10px] font-black text-slate-500 uppercase block mb-1">Distância Longe (m)</label>
                    <input type="number" id="distL" value="5.00" oninput="runTA()" class="bg-transparent text-4xl font-black text-white w-full outline-none">
                </div>
                <div class="p-5 bg-ab-bg rounded-2xl border border-ab-border">
                    <label class="text-[10px] font-black text-slate-500 uppercase block mb-1">Distância Perto (m)</label>
                    <input type="number" id="distR" value="1.00" oninput="runTA()" class="bg-transparent text-4xl font-black text-white w-full outline-none">
                </div>
                <div class="bg-ab-bg p-10 rounded-[2.5rem] border border-ab-border text-center">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">ms para o DSP</p>
                    <div class="display-huge text-white italic" id="taValue">11.63</div>
                </div>
            </div>
        </div>

        <div id="tab-polaridade" class="tab-content hidden text-center">
            <div class="bg-ab-card p-8 rounded-[2.5rem] border border-ab-border max-w-lg mx-auto">
                <div id="statusCircle" class="w-56 h-56 mx-auto rounded-full border-[12px] border-ab-bg flex items-center justify-center mb-8 transition-all">
                    <span id="phaseResult" class="text-xl font-black text-slate-700 uppercase italic">Aguardando</span>
                </div>
                <button onclick="toggleScanner()" id="btnScanner" class="w-full bg-ab-purple py-5 rounded-2xl font-black text-[11px] uppercase text-white shadow-xl">Ativar Scanner</button>
            </div>
        </div>
    </div>

    <script>
        let reportData = { status: "", detail: "", color: "" };
        let running = false;
        let audioCtx, analyzer, dataArray;

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('active');
        }

        function runCalc() {
            const qty = parseFloat(document.getElementById('spkQty').value)||1;
            const imp = parseFloat(document.getElementById('spkImp').value)||8;
            const pwr = parseFloat(document.getElementById('spkPwr').value)||0;
            const ampI = parseFloat(document.getElementById('ampImpMin').value)||1;

            const resImp = imp / qty;
            const totalPwr = pwr * qty;
            const vrms = Math.sqrt(totalPwr * resImp);

            document.getElementById('resImp').innerText = resImp.toFixed(1);
            document.getElementById('resTotalPwr').innerText = totalPwr.toFixed(0);
            document.getElementById('resVolts').innerText = vrms.toFixed(0);

            const badge = document.getElementById('statusBadge');
            if (resImp < ampI) {
                badge.innerText = "⚠ CARGA PERIGOSA";
                badge.className = "text-center py-2.5 rounded-full font-black text-[9px] uppercase border border-ab-red/50 text-ab-red bg-ab-red/10 mb-6 cursor-pointer";
                reportData = { status: "IMPEDÂNCIA BAIXA", color: "text-ab-red", detail: "A carga final está abaixo do que o amplificador suporta. Risco de queima." };
            } else {
                badge.innerText = "✓ SISTEMA OTIMIZADO";
                badge.className = "text-center py-2.5 rounded-full font-black text-[9px] uppercase border border-ab-green/50 text-ab-green bg-ab-green/10 mb-6 cursor-pointer";
                reportData = { status: "SISTEMA SEGURO", color: "text-ab-green", detail: "Tudo certo! A carga está casada com o amplificador." };
            }
        }

        function runTA() {
            let L = parseFloat(document.getElementById('distL').value)||0, R = parseFloat(document.getElementById('distR').value)||0;
            document.getElementById('taValue').innerText = (Math.abs(R - L) / 0.344).toFixed(2);
        }

        async function toggleScanner() {
            if (running) { location.reload(); return; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyzer = audioCtx.createAnalyser();
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyzer);
                dataArray = new Float32Array(analyzer.fftSize);
                running = true;
                document.getElementById('btnScanner').innerText = "PARAR";
                document.getElementById('btnScanner').classList.replace('bg-ab-purple', 'bg-ab-red');
                detect();
            } catch (e) { alert("Erro ao acessar mic"); }
        }

        function detect() {
            if (!running) return;
            analyzer.getFloatTimeDomainData(dataArray);
            let max = 0, idx = 0;
            for (let i = 0; i < dataArray.length; i++) {
                if (Math.abs(dataArray[i]) > max) { max = Math.abs(dataArray[i]); idx = i; }
            }
            if (max > 0.25) {
                const res = document.getElementById('phaseResult');
                const circ = document.getElementById('statusCircle');
                if (dataArray[idx] > 0) {
                    res.innerText = "+ POSITIVA"; res.className = "text-3xl font-black text-ab-green italic";
                    circ.style.borderColor = "#22c55e";
                } else {
                    res.innerText = "- NEGATIVA"; res.className = "text-3xl font-black text-ab-red italic";
                    circ.style.borderColor = "#ef4444";
                }
                setTimeout(() => { circ.style.borderColor = "#30363d"; res.innerText = "Aguardando"; res.className = "text-xl font-black text-slate-700 uppercase italic"; }, 800);
            }
            requestAnimationFrame(detect);
        }

        function openReport() {
            document.getElementById('reportContent').innerHTML = `<h2 class="${reportData.color} font-black text-2xl uppercase italic">${reportData.status}</h2><p class="text-slate-400 font-bold uppercase text-xs">${reportData.detail}</p>`;
            document.getElementById('reportModal').classList.add('active');
        }
        function closeModal() { document.getElementById('reportModal').classList.remove('active'); }

        window.onload = () => { runCalc(); runTA(); };
    </script>
</body>
</html>
