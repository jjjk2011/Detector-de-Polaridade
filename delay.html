<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delay / TA - AudioBase Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0a0e14; --card: #161b22; --text: #fff; --dim: #8b949e; --border: #30363d; --accent: #ff9800; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .top-bar { width: 100%; padding: 20px; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; }
        .btn-back { color: var(--text); text-decoration: none; background: var(--card); border: 1px solid var(--border); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .container { width: 90%; max-width: 500px; }
        .header-page { text-align: center; margin: 10px 0 30px; }
        .header-page i { color: var(--accent); font-size: 2rem; margin-bottom: 10px; }
        .header-page h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }

        .res-display { background: var(--card); border: 2px solid var(--accent); border-radius: 25px; padding: 40px 10px; margin-bottom: 25px; text-align: center; box-shadow: 0 0 20px rgba(255,152,0,0.1); }
        .res-main { font-size: 3.5rem; font-weight: bold; font-family: monospace; color: var(--accent); line-height: 1; }
        .res-label { color: var(--dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }

        .control-group { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .group-title { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        
        label { display: block; color: var(--dim); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; font-size: 1.1rem; box-sizing: border-box; outline: none; }
        input[type=range] { accent-color: var(--accent); margin-top: 10px; }

        .fine-tune { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-tune { background: #1c2128; border: 1px solid var(--border); color: white; padding: 12px 5px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        
        .btn-action { width: 100%; padding: 20px; border-radius: 20px; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-size: 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="top-bar"><a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i></a><div style="color:var(--dim); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;">Time Alignment</div><div style="width: 45px;"></div></div>
    <div class="container">
        <div class="header-page"><i class="fas fa-stopwatch"></i><h1>Delay / TA</h1></div>
        <div class="res-display"><div class="res-main" id="res-ms">0.00</div><div class="res-label">ms (Milissegundos)</div></div>
        <div class="control-group">
            <span class="group-title">Ajuste de Distância</span>
            <label>Metros (m)</label>
            <input type="number" id="dist" value="1.00" step="0.01" oninput="calc()">
            <div class="fine-tune">
                <button class="btn-tune" onclick="adj(-0.1)">-10cm</button><button class="btn-tune" onclick="adj(-0.01)">-1cm</button><button class="btn-tune" onclick="adj(0.01)">+1cm</button><button class="btn-tune" onclick="adj(0.1)">+10cm</button>
            </div>
        </div>
        <div class="control-group">
            <span class="group-title">Ambiente</span>
            <label>Temperatura: <span id="t-val" style="color:var(--accent)">25</span>°C</label>
            <input type="range" id="temp" min="0" max="50" value="25" oninput="calc()">
        </div>
        <button class="btn-action" onclick="alert('Iniciando microfone...')"><i class="fas fa-microphone"></i> Medição Automática</button>
    </div>
    <script>
        function calc() {
            const d = parseFloat(document.getElementById('dist').value)||0;
            const t = parseFloat(document.getElementById('temp').value);
            document.getElementById('t-val').innerText = t;
            const v = 331.4 + (0.6 * t);
            document.getElementById('res-ms').innerText = ((d/v)*1000).toFixed(2);
        }
        function adj(v) { const i = document.getElementById('dist'); i.value = (parseFloat(i.value)+v).toFixed(2); calc(); }
        calc();
    </script>
</body>
</html>
