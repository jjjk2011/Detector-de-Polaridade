<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico de Sistema | AudioBase Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0d14; color: #c9d1d9; font-family: system-ui, sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 1.5rem; }
        input, select { background: #0a0d14 !important; border: 1px solid #30363d !important; color: white !important; font-weight: bold; transition: 0.3s; }
        input:focus { border-color: #06b6d4 !important; box-shadow: 0 0 10px rgba(6, 182, 212, 0.2); }
        .report-item { border-left: 2px solid #30363d; padding-left: 12px; margin-bottom: 12px; }
    </style>
</head>
<body class="p-4 pb-20">
    <div class="max-w-md mx-auto space-y-4">
        <header class="flex justify-between items-center py-2">
            <a href="index.html" class="text-cyan-500 text-[10px] font-black uppercase tracking-widest">← Menu Principal</a>
            <h1 class="text-white font-black text-xs tracking-widest uppercase">Diagnóstico Pro</h1>
        </header>

        <!-- ENTRADA DE DADOS -->
        <div class="card p-6 space-y-4 shadow-xl">
            <div class="flex items-center gap-2 mb-2">
                <span class="bg-cyan-500/20 text-cyan-500 p-1.5 rounded-lg text-xs">🔊</span>
                <h3 class="text-[10px] font-black text-white uppercase tracking-widest">Configuração do Set</h3>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[9px] font-bold text-gray-500 uppercase block mb-1">Alto-Falantes</label><input type="number" id="qty" value="2" class="w-full p-3 rounded-xl outline-none"></div>
                <div><label class="text-[9px] font-bold text-gray-500 uppercase block mb-1">Ohms (Cada)</label><input type="number" id="imp" value="4" class="w-full p-3 rounded-xl outline-none"></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[9px] font-bold text-gray-500 uppercase block mb-1">Watts RMS (Cada)</label><input type="number" id="pwr" value="500" class="w-full p-3 rounded-xl outline-none"></div>
                <div><label class="text-[9px] font-bold text-gray-500 uppercase block mb-1">Ligação</label><select id="conn" class="w-full p-3 rounded-xl outline-none"><option value="par">Paralelo</option><option value="ser">Série</option></select></div>
            </div>

            <div class="pt-4 border-t border-gray-800">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-purple-500/20 text-purple-500 p-1.5 rounded-lg text-xs">🔌</span>
                    <h3 class="text-[10px] font-black text-white uppercase tracking-widest">Dados do Amplificador</h3>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[9px] font-bold text-gray-500 uppercase block mb-1">Potência (Canal)</label><input type="number" id="ampPwr" value="1200" class="w-full p-3 rounded-xl outline-none"></div>
                    <div><label class="text-[9px] font-bold text-gray-500 uppercase block mb-1">Imp. Mínima</label><input type="number" id="ampImp" value="2" class="w-full p-3 rounded-xl outline-none"></div>
                </div>
            </div>
        </div>

        <!-- RESULTADOS RÁPIDOS -->
        <div id="statusHeader" class="card p-5 border-l-4 transition-all duration-500">
            <div class="flex justify-between items-center">
                <div class="text-center flex-1 border-r border-gray-800">
                    <p class="text-[8px] font-bold text-gray-500 uppercase">Impedância Final</p>
                    <p id="resImp" class="text-xl font-black italic">--</p>
                </div>
                <div class="text-center flex-1 border-r border-gray-800">
                    <p class="text-[8px] font-bold text-gray-500 uppercase">Potência Set</p>
                    <p id="resPwr" class="text-xl font-black italic">--</p>
                </div>
                <div class="text-center flex-1">
                    <p class="text-[8px] font-bold text-gray-500 uppercase">Vrms Limiter</p>
                    <p id="resVrms" class="text-xl font-black text-cyan-500 italic">--</p>
                </div>
            </div>
        </div>

        <!-- RELATÓRIO AUTOMATIZADO -->
        <div class="card p-6 shadow-2xl overflow-hidden relative">
            <div class="flex items-center gap-2 mb-6 border-b border-gray-800 pb-4">
                <span class="text-lg">📋</span>
                <h2 class="text-xs font-black text-white uppercase tracking-[0.2em]">Relatório de Compatibilidade</h2>
            </div>

            <div id="reportBox" class="space-y-6">
                <!-- Injetado via JS -->
            </div>
            
            <div class="mt-8 pt-4 border-t border-gray-800 flex justify-between items-center">
                <p class="text-[8px] font-black text-gray-600 uppercase">Cálculo Baseado em RMS Real</p>
                <div id="headroomTag" class="px-3 py-1 rounded-full text-[9px] font-black uppercase">--</div>
            </div>
        </div>
    </div>

    <script>
        function updateReport() {
            // Coleta de dados
            const qty = parseFloat(document.getElementById('qty').value) || 0;
            const imp = parseFloat(document.getElementById('imp').value) || 0;
            const pwr = parseFloat(document.getElementById('pwr').value) || 0;
            const conn = document.getElementById('conn').value;
            const ampPwr = parseFloat(document.getElementById('ampPwr').value) || 0;
            const ampImp = parseFloat(document.getElementById('ampImp').value) || 0;

            // Cálculos Técnicos
            const finalImp = conn === 'par' ? (imp / qty) : (imp * qty);
            const totalSpeakerPwr = pwr * qty;
            const vrms = Math.sqrt(totalSpeakerPwr * finalImp);
            const amps = vrms / finalImp || 0;
            const headroom = ((ampPwr / totalSpeakerPwr) - 1) * 100;

            // Atualiza Resumo Superior
            document.getElementById('resImp').innerText = finalImp.toFixed(1) + " Ω";
            document.getElementById('resPwr').innerText = totalSpeakerPwr + " W";
            document.getElementById('resVrms').innerText = vrms.toFixed(1);

            // LOGICA DO RELATÓRIO AUTOMÁTICO
            const reportBox = document.getElementById('reportBox');
            const statusHeader = document.getElementById('statusHeader');
            const headroomTag = document.getElementById('headroomTag');
            let html = "";

            // 1. ANÁLISE DE IMPEDÂNCIA (CRÍTICO)
            if (finalImp < ampImp) {
                statusHeader.style.borderColor = "#ef4444";
                html += `
                    <div class="report-item border-red-500">
                        <p class="text-red-500 font-black text-[10px] uppercase mb-1 italic">🔴 ERRO CRÍTICO: Casamento Impossível</p>
                        <p class="text-[11px] text-gray-300 leading-relaxed">Sua impedância final de <b>${finalImp.toFixed(1)}Ω</b> está abaixo do mínimo de <b>${ampImp}Ω</b> do amplificador. O amp vai entrar em proteção térmica ou <b>queimar as saídas</b> em poucos minutos de uso.</p>
                        <p class="text-[10px] text-red-400 mt-2 font-bold italic">➜ Sugestão: Mude a ligação para SÉRIE ou use falantes de maior impedância.</p>
                    </div>`;
            } else {
                statusHeader.style.borderColor = "#22c55e";
                html += `
                    <div class="report-item border-green-500">
                        <p class="text-green-500 font-black text-[10px] uppercase mb-1 italic">✅ Impedância: OK</p>
                        <p class="text-[11px] text-gray-300">O amplificador trabalhará folgado. A impedância de ${finalImp.toFixed(1)}Ω é estável para este canal.</p>
                    </div>`;
            }

            // 2. ANÁLISE DE POTÊNCIA E CLIPPING
            if (ampPwr < totalSpeakerPwr) {
                html += `
                    <div class="report-item border-amber-500">
                        <p class="text-amber-500 font-black text-[10px] uppercase mb-1 italic">⚠️ RISCO: Falta de Potência (Underpower)</p>
                        <p class="text-[11px] text-gray-300 leading-relaxed">Seu amplificador entrega ${ampPwr}W, mas os falantes pedem ${totalSpeakerPwr}W. Você terá que subir muito o ganho, gerando <b>Onda Quadrada (Clipping)</b>, que queima a bobina por calor excessivo.</p>
                        <p class="text-[10px] text-amber-400 mt-2 font-bold italic">➜ Sugestão: Não ultrapasse 70% do volume ou use um amplificador mais forte.</p>
                    </div>`;
            } else if (headroom >= 20 && headroom <= 100) {
                html += `
                    <div class="report-item border-cyan-500">
                        <p class="text-cyan-500 font-black text-[10px] uppercase mb-1 italic">💎 Performance: EXCELENTE</p>
                        <p class="text-[11px] text-gray-300 leading-relaxed">Você tem uma folga (Headroom) de <b>${Math.round(headroom)}%</b>. Isso garante dinâmica musical, graves limpos e transientes perfeitos sem esforço do equipamento.</p>
                    </div>`;
            }

            // 3. RECOMENDAÇÃO DE CABEAMENTO
            let cab = "1.5mm²";
            if(amps > 12) cab = "2.5mm²";
            if(amps > 20) cab = "4.0mm²";
            if(amps > 35) cab = "6.0mm²";
            if(amps > 50) cab = "10.0mm² ou superior";

            html += `
                <div class="report-item border-blue-500">
                    <p class="text-blue-400 font-black text-[10px] uppercase mb-1 italic">⚡ Cabeamento e Corrente</p>
                    <p class="text-[11px] text-gray-300">O sistema puxará <b>${amps.toFixed(1)} Amperes</b>. Recomendamos cabo de no mínimo <b>${cab}</b> para evitar perda de potência e aquecimento dos fios.</p>
                </div>`;

            // 4. INSTRUÇÃO DO LIMITER
            html += `
                <div class="bg-black/40 p-4 rounded-xl border border-gray-800">
                    <p class="text-white font-black text-[10px] uppercase mb-2 italic">🛠️ Como configurar o DSP?</p>
                    <p class="text-[10px] text-gray-400 leading-relaxed">Para proteger este set, configure o Limiter do seu processador para atuar em <b>${vrms.toFixed(1)} Volts</b>. Isso impedirá que o falante receba mais energia do que suporta.</p>
                </div>`;

            // Atualiza o Headroom Tag
            headroomTag.innerText = `Headroom: ${Math.round(headroom)}%`;
            headroomTag.style.background = headroom < 0 ? "#ef4444" : "#06b6d4";
            headroomTag.style.color = "white";

            reportBox.innerHTML = html;
        }

        // Eventos
        document.querySelectorAll('input, select').forEach(e => {
            e.addEventListener('input', updateReport);
        });

        // Início automático
        updateReport();
    </script>
</body>
</html>
