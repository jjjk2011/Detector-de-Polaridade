<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Calc | AudioBase Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0d14; color: #c9d1d9; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 1.5rem; }
        input, select { background: #0a0d14 !important; border: 1px solid #30363d !important; color: white !important; }
    </style>
</head>
<body class="p-4 pb-20">
    <div class="max-w-md mx-auto space-y-4">
        <header class="flex justify-between items-center py-4">
            <a href="index.html" class="text-cyan-500 text-xs font-bold">← VOLTAR</a>
            <h1 class="text-white font-black text-sm tracking-widest uppercase">Power Calculator</h1>
        </header>

        <div class="card p-6 space-y-5">
            <h3 class="text-[10px] font-black text-cyan-500 tracking-widest uppercase">Alto-Falantes</h3>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] font-bold text-gray-500 block mb-1 uppercase">Quantidade</label>
                    <input type="number" id="qty" value="2" class="w-full p-3 rounded-xl font-bold outline-none focus:border-cyan-500">
                </div>
                <div>
                    <label class="text-[9px] font-bold text-gray-500 block mb-1 uppercase">Impedância (Ω)</label>
                    <input type="number" id="imp" value="8" class="w-full p-3 rounded-xl font-bold outline-none focus:border-cyan-500">
                </div>
            </div>
            <div>
                <label class="text-[9px] font-bold text-gray-500 block mb-1 uppercase">Potência RMS (Cada)</label>
                <input type="number" id="pwr" value="500" class="w-full p-3 rounded-xl font-bold outline-none focus:border-cyan-500">
            </div>
            <div>
                <label class="text-[9px] font-bold text-gray-500 block mb-1 uppercase">Tipo de Ligação</label>
                <select id="link" class="w-full p-3 rounded-xl font-bold outline-none">
                    <option value="par">Paralelo (Divide Ω)</option>
                    <option value="ser">Série (Soma Ω)</option>
                </select>
            </div>
        </div>

        <div class="card p-6 bg-gradient-to-br from-cyan-900/20 to-transparent border-cyan-500/30">
            <h3 class="text-[10px] font-black text-cyan-500 tracking-widest uppercase mb-4">Resultado do Sistema</h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="text-center p-3 bg-black/40 rounded-2xl">
                    <p class="text-[8px] text-gray-500 uppercase font-bold">Impedância Final</p>
                    <p id="resImp" class="text-xl font-black text-white">4.0 <span class="text-xs">Ω</span></p>
                </div>
                <div class="text-center p-3 bg-black/40 rounded-2xl">
                    <p class="text-[8px] text-gray-500 uppercase font-bold">Potência Total</p>
                    <p id="resPwr" class="text-xl font-black text-white">1000 <span class="text-xs">W</span></p>
                </div>
            </div>

            <div class="mt-4 p-5 bg-cyan-500 rounded-2xl text-black text-center">
                <p class="text-[10px] font-black uppercase tracking-widest opacity-70">Ajuste do Limiter</p>
                <p id="resVrms" class="text-4xl font-black">63.2</p>
                <p class="text-[10px] font-black uppercase mt-1">Volts RMS (Vrms)</p>
            </div>

            <div class="mt-4 grid grid-cols-2 gap-4 text-center">
                <div>
                    <p class="text-[8px] text-gray-500 uppercase font-bold">Corrente Máx.</p>
                    <p id="resAmp" class="text-sm font-black text-white">15.8 A</p>
                </div>
                <div>
                    <p class="text-[8px] text-gray-500 uppercase font-bold">Cabo Recom.</p>
                    <p id="resCable" class="text-sm font-black text-white">4.0 mm²</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calc() {
            const q = parseFloat(document.getElementById('qty').value) || 1;
            const i = parseFloat(document.getElementById('imp').value) || 4;
            const p = parseFloat(document.getElementById('pwr').value) || 0;
            const l = document.getElementById('link').value;

            const finalImp = l === 'par' ? i / q : i * q;
            const finalPwr = p * q;
            const vrms = Math.sqrt(finalPwr * finalImp);
            const amps = finalPwr / vrms || 0;

            document.getElementById('resImp').innerText = finalImp.toFixed(1) + " Ω";
            document.getElementById('resPwr').innerText = finalPwr.toFixed(0) + " W";
            document.getElementById('resVrms').innerText = vrms.toFixed(1);
            document.getElementById('resAmp').innerText = amps.toFixed(1) + " A";
            
            let cable = "1.5";
            if(amps > 10) cable = "2.5";
            if(amps > 15) cable = "4.0";
            if(amps > 25) cable = "6.0";
            if(amps > 40) cable = "10.0";
            document.getElementById('resCable').innerText = cable + " mm²";
        }

        document.querySelectorAll('input, select').forEach(el => el.oninput = calc);
        calc();
    </script>
</body>
</html>
