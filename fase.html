<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Fase - AudioBase Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0a0e14; --card: #161b22; --text: #fff; --dim: #8b949e; --border: #30363d; --accent: #a370f7; --orange: #ff9800; --success: #44ff44; --danger: #ff4d4d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .top-bar { width: 100%; padding: 20px; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; }
        .btn-back { color: var(--text); text-decoration: none; background: var(--card); border: 1px solid var(--border); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .container { width: 90%; max-width: 500px; }
        .header-page { text-align: center; margin: 10px 0 20px; }
        .header-page i { color: var(--accent); font-size: 2rem; margin-bottom: 10px; }
        .header-page h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }

        .scope-box { background: #000; border: 1px solid var(--border); border-radius: 20px; height: 120px; margin-bottom: 20px; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        .group-label { color: var(--dim); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        .pa-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .pa-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 20px 5px; cursor: pointer; text-align: center; transition: 0.3s; }
        .pa-card i { font-size: 1.5rem; color: var(--orange); margin-bottom: 8px; display: block; }
        .pa-card span { font-size: 0.65rem; font-weight: bold; color: var(--dim); text-transform: uppercase; }
        .pa-card.playing { border-color: var(--orange); background: rgba(255,152,0,0.1); }

        .res-display { background: var(--card); border: 2px solid var(--border); border-radius: 25px; padding: 40px 10px; margin-bottom: 25px; text-align: center; transition: 0.3s; }
        .res-display.pos { border-color: var(--success); box-shadow: 0 0 20px rgba(68,255,68,0.1); }
        .res-display.neg { border-color: var(--danger); box-shadow: 0 0 20px rgba(255,77,77,0.1); }
        .res-main { font-size: 2.2rem; font-weight: bold; margin: 0; }

        .btn-action { width: 100%; padding: 20px; border-radius: 20px; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-size: 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-action.active { background: var(--accent); color: #000; }
    </style>
</head>
<body>
    <div class="top-bar"><a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i></a><div style="color:var(--dim); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;">Phase Scanner</div><div style="width: 45px;"></div></div>
    <div class="container">
        <div class="header-page"><i class="fas fa-wave-square"></i><h1>Scanner de Fase</h1></div>
        <div class="scope-box"><canvas id="scope"></canvas></div>
        <span class="group-label">Gerador de Pulso</span>
        <div class="pa-grid">
            <div id="btn-sub" class="pa-card" onclick="togglePulse('sub')"><i class="fas fa-bullseye"></i><span>Sub</span></div>
            <div id="btn-medio" class="pa-card" onclick="togglePulse('medio')"><i class="fas fa-volume-down"></i><span>Médio</span></div>
            <div id="btn-agudo" class="pa-card" onclick="togglePulse('agudo')"><i class="fas fa-bullhorn"></i><span>Agudo</span></div>
        </div>
        <div id="res-card" class="res-display"><div id="res-main" class="res-main">---</div></div>
        <button id="btn-mic" class="btn-action" onclick="toggleMic()"><i class="fas fa-microphone"></i> Ligar Analisador</button>
    </div>
    <script>
        let audioCtx, analyser, source, micActive = false, activePulse = null, pulseTimer;
        const canvas = document.getElementById('scope'), ctx = canvas.getContext('2d');
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }
        async function toggleMic() {
            initAudio(); if (micActive) { location.reload(); return; }
            const s = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
            source = audioCtx.createMediaStreamSource(s); analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048; source.connect(analyser);
            micActive = true; document.getElementById('btn-mic').classList.add('active'); draw(); monitor();
        }
        function togglePulse(v) {
            initAudio(); if (activePulse === v) { stop(); } 
            else { stop(); activePulse = v; document.getElementById(`btn-${v}`).classList.add('playing'); loop(); }
        }
        function stop() { clearTimeout(pulseTimer); document.querySelectorAll('.pa-card').forEach(c => c.classList.remove('playing')); activePulse = null; }
        function loop() {
            if (!activePulse) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            if (activePulse === 'sub') { o.type = 'sawtooth'; o.frequency.value = 40; }
            else if (activePulse === 'medio') { o.type = 'triangle'; o.frequency.value = 500; }
            else { o.type = 'square'; o.frequency.value = 5000; }
            g.gain.setValueAtTime(0, audioCtx.currentTime); g.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.001); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.01);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.02);
            pulseTimer = setTimeout(loop, 1000);
        }
        function monitor() {
            if (!micActive) return;
            const d = new Float32Array(analyser.fftSize); analyser.getFloatTimeDomainData(d);
            let f = 0; for (let i = 0; i < d.length; i++) { if (Math.abs(d[i]) > 0.15) { f = d[i]; break; } }
            if (f !== 0) {
                const c = document.getElementById('res-card'), m = document.getElementById('res-main');
                if (f > 0) { c.className = "res-display pos"; m.innerText = "NORMAL (+)"; m.style.color = "var(--success)"; }
                else { c.className = "res-display neg"; m.innerText = "INVERTIDA (-)"; m.style.color = "var(--danger)"; }
            }
            requestAnimationFrame(monitor);
        }
        function draw() {
            if (!micActive) return;
            const d = new Uint8Array(analyser.frequencyBinCount); analyser.getByteTimeDomainData(d);
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.lineWidth = 2; ctx.strokeStyle = '#a370f7'; ctx.beginPath();
            let x = 0, s = canvas.width/d.length;
            for(let i=0; i<d.length; i++) { let y = (d[i]/128.0)*canvas.height/2; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); x+=s; }
            ctx.stroke(); requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
