<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polarity Scan | AudioBase Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0d14; color: #c9d1d9; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 1.5rem; }
        canvas { width: 100%; height: 120px; background: #000; border-radius: 1rem; border: 1px solid #30363d; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #30363d; }
        .dot.active { background: #22c55e; box-shadow: 0 0 15px #22c55e; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto space-y-4">
        <header class="flex justify-between items-center py-4">
            <a href="index.html" class="text-cyan-500 text-xs font-bold">← VOLTAR</a>
            <h1 class="text-white font-black text-sm tracking-widest">POLARITY SCAN</h1>
        </header>

        <div class="card p-5">
            <canvas id="oscillo"></canvas>
            
            <div id="resArea" class="hidden text-center p-6 rounded-2xl border-2 my-4 transition-all">
                <div id="resIcon" class="text-5xl font-black mb-2"></div>
                <div id="resText" class="text-xl font-black tracking-widest"></div>
            </div>

            <div class="flex justify-center gap-3 my-6">
                <div class="dot" id="dot0"></div>
                <div class="dot" id="dot1"></div>
                <div class="dot" id="dot2"></div>
            </div>

            <button id="mainBtn" onclick="toggleScanner()" class="w-full py-5 bg-gradient-to-r from-purple-600 to-indigo-600 rounded-2xl font-black text-white shadow-lg active:scale-95 transition-all uppercase tracking-widest">
                🎤 Iniciar Detector
            </button>
        </div>

        <div class="card p-5 space-y-4">
            <div class="flex gap-2 p-1 bg-black/40 rounded-xl">
                <button id="modeDriver" onclick="setMode('driver')" class="flex-1 py-3 rounded-lg text-[10px] font-black bg-purple-600 text-white transition">DRIVERS</button>
                <button id="modeSub" onclick="setMode('sub')" class="flex-1 py-3 rounded-lg text-[10px] font-black text-gray-500 transition">SUBWOOFER</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="playPulse()" class="bg-gray-800 py-4 rounded-xl text-[10px] font-black border border-gray-700 active:bg-cyan-900">▶️ TESTE ÚNICO</button>
                <button id="loopBtn" onclick="toggleLoop()" class="bg-gray-800 py-4 rounded-xl text-[10px] font-black border border-gray-700">🔁 LOOP (1s)</button>
            </div>
        </div>
    </div>

    <script>
        let audioCtx, analyser, micSource, filterNode, animationId, isRunning = false, currentMode = 'driver', results = [], cooldown = false, isLooping = false, loopInt;
        const canvas = document.getElementById('oscillo'), ctx = canvas.getContext('2d');

        function setMode(m) {
            currentMode = m;
            document.getElementById('modeDriver').className = m === 'driver' ? 'flex-1 py-3 rounded-lg text-[10px] font-black bg-purple-600 text-white' : 'flex-1 py-3 rounded-lg text-[10px] font-black text-gray-500';
            document.getElementById('modeSub').className = m === 'sub' ? 'flex-1 py-3 rounded-lg text-[10px] font-black bg-orange-600 text-white' : 'flex-1 py-3 rounded-lg text-[10px] font-black text-gray-500';
            if(isRunning) stopScanner();
        }

        async function toggleScanner() {
            if(isRunning) { stopScanner(); return; }
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, autoGainControl: false, noiseSuppression: false } });
            
            micSource = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            filterNode = audioCtx.createBiquadFilter();
            
            // FILTRAGEM INTELIGENTE
            if(currentMode === 'driver') {
                filterNode.type = 'highpass'; filterNode.frequency.value = 1000;
            } else {
                filterNode.type = 'lowpass'; filterNode.frequency.value = 150;
            }

            micSource.connect(filterNode); filterNode.connect(analyser);
            analyser.fftSize = 2048;
            isRunning = true; results = []; 
            document.getElementById('mainBtn').innerText = '⏹ PARAR';
            document.getElementById('mainBtn').classList.replace('from-purple-600', 'from-red-600');
            document.getElementById('resArea').classList.add('hidden');
            [0,1,2].forEach(i => document.getElementById('dot'+i).classList.remove('active'));
            draw(); process();
        }

        function stopScanner() {
            isRunning = false; cancelAnimationFrame(animationId);
            if(audioCtx) audioCtx.close();
            document.getElementById('mainBtn').innerText = '🎤 INICIAR DETECTOR';
            document.getElementById('mainBtn').classList.replace('from-red-600', 'from-purple-600');
        }

        // GERADOR DE PULSO ASSIMÉTRICO (MELHORADO)
        function playPulse() {
            if(!audioCtx) audioCtx = new AudioContext();
            const dur = 0.5, sr = audioCtx.sampleRate, buffer = audioCtx.createBuffer(1, sr * dur, sr), data = buffer.getChannelData(0);
            for(let i=0; i<sr*dur; i++) {
                let t = i/sr;
                if(currentMode === 'driver') data[i] = Math.exp(-t*100) * Math.sin(2*Math.PI*1500*t);
                else data[i] = Math.exp(-t*15) * Math.sin(2*Math.PI*50*t);
            }
            const src = audioCtx.createBufferSource(); src.buffer = buffer;
            src.connect(audioCtx.destination); src.start();
        }

        function toggleLoop() {
            isLooping = !isLooping;
            document.getElementById('loopBtn').classList.toggle('border-cyan-500');
            if(isLooping) loopInt = setInterval(playPulse, 1000);
            else clearInterval(loopInt);
        }

        function process() {
            if(!isRunning) return;
            const data = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(data);
            let max = 0, idx = 0;
            for(let i=0; i<data.length; i++) {
                if(Math.abs(data[i]) > max) { max = Math.abs(data[i]); idx = i; }
            }
            if(max > 0.15 && !cooldown) {
                results.push(data[idx] > 0);
                document.getElementById('dot'+(results.length-1)).classList.add('active');
                cooldown = true; setTimeout(() => cooldown = false, 700);
                if(results.length >= 3) { finalize(); return; }
            }
            animationId = requestAnimationFrame(process);
        }

        function finalize() {
            const pos = results.filter(r => r === true).length >= 2;
            const area = document.getElementById('resArea');
            area.classList.remove('hidden');
            area.style.borderColor = pos ? '#22c55e' : '#ef4444';
            area.style.backgroundColor = pos ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)';
            document.getElementById('resIcon').innerText = pos ? '⊕' : '⊖';
            document.getElementById('resIcon').style.color = pos ? '#22c55e' : '#ef4444';
            document.getElementById('resText').innerText = pos ? 'POSITIVA' : 'INVERTIDA';
            document.getElementById('resText').style.color = pos ? '#22c55e' : '#ef4444';
            stopScanner();
        }

        function draw() {
            if(!isRunning) return;
            requestAnimationFrame(draw);
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteTimeDomainData(data);
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.lineWidth = 2; ctx.strokeStyle = currentMode === 'driver' ? '#a855f7' : '#f97316';
            ctx.beginPath();
            let x = 0, slice = canvas.width / data.length;
            for(let i=0; i<data.length; i++) {
                let y = (data[i]/128.0) * canvas.height/2;
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                x += slice;
            }
            ctx.stroke();
        }
        window.onload = () => { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; };
    </script>
</body>
</html>
