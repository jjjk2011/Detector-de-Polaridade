<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polarity Scan | AudioBase Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0d14; color: #c9d1d9; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 1.5rem; }
        canvas { width: 100%; height: 120px; background: #000; border-radius: 1rem; border: 1px solid #30363d; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #30363d; transition: 0.3s; }
        .dot.active { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        select { background: #0a0d14 !important; border: 1px solid #30363d !important; color: white !important; }
        .btn-gen { background: #1f2937; border: 1px solid #30363d; transition: all 0.2s; }
        .btn-gen:active { transform: scale(0.95); background: #374151; }
        .loop-active { border-color: #a855f7 !important; color: #a855f7; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="p-4 pb-10">
    <div class="max-w-md mx-auto space-y-4">
        <header class="flex justify-between items-center py-2">
            <a href="index.html" class="text-cyan-500 text-[10px] font-black uppercase tracking-widest">← Menu</a>
            <h1 class="text-white font-black text-xs tracking-widest uppercase italic">Polarity Scan</h1>
        </header>

        <!-- TELA DE RESULTADO E OSCILOSCÓPIO -->
        <div class="card p-5">
            <canvas id="oscillo"></canvas>
            <div id="resArea" class="hidden text-center p-4 rounded-2xl border-2 my-4 transition-all">
                <div id="resIcon" class="text-4xl font-bold"></div>
                <div id="resText" class="text-lg font-black tracking-widest"></div>
            </div>
            <div class="flex justify-center gap-3 mb-4">
                <div class="dot" id="dot0"></div><div class="dot" id="dot1"></div><div class="dot" id="dot2"></div>
            </div>
            <button id="mainBtn" onclick="toggleScanner()" class="w-full py-4 bg-purple-600 rounded-2xl font-black text-white uppercase text-sm tracking-widest shadow-lg shadow-purple-900/20">🎤 Ativar Detector</button>
        </div>

        <!-- GERADOR DE SINAL -->
        <div class="card p-5 space-y-4">
            <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest">🔊 Gerador de Sinal (Fonte)</h3>
            <div class="grid grid-cols-2 gap-3">
                <button id="btnPlayPulse" onclick="playPulse()" class="btn-gen py-4 rounded-xl text-[10px] font-black uppercase">▶️ Tocar Pulso</button>
                <button id="btnLoop" onclick="toggleLoop()" class="btn-gen py-4 rounded-xl text-[10px] font-black uppercase italic">🔁 Loop (1s)</button>
            </div>

            <div class="pt-2 border-t border-gray-800">
                <div class="flex gap-2 p-1 bg-black/40 rounded-xl mb-4">
                    <button id="mDriver" onclick="setMode('driver')" class="flex-1 py-2 rounded-lg text-[10px] font-bold bg-purple-600 text-white uppercase">Drivers</button>
                    <button id="mSub" onclick="setMode('sub')" class="flex-1 py-2 rounded-lg text-[10px] font-bold text-gray-500 uppercase">Subwoofer</button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 block mb-2 uppercase italic">🎙️ Seleção de Entrada</label>
                        <select id="micSelect" class="w-full p-3 rounded-xl text-xs outline-none font-bold"></select>
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] font-bold text-gray-500 mb-2 uppercase"><span>⚡ Sensibilidade (Trigger)</span><span id="sensVal">25%</span></div>
                        <input type="range" id="sensSlider" class="w-full h-1 bg-gray-700 rounded-lg appearance-none accent-purple-500" value="25">
                    </div>
                </div>
            </div>
        </div>

        <!-- DICA PARA LEIGOS -->
        <div class="card p-5 bg-purple-500/5 border-purple-500/20">
            <p class="text-[10px] text-purple-400 font-black uppercase mb-1 italic">💡 Como funciona?</p>
            <p class="text-[10px] text-gray-500 leading-relaxed">
                O <b>Pulso</b> faz o alto-falante "pular" para frente. O <b>Detector</b> ouve se ele pulou para frente (+) ou para trás (-). Se der negativo, inverta os fios (+) e (-) do falante.
            </p>
        </div>
    </div>

    <script>
        let audioCtx, analyser, micSource, aniId, isRunning = false, currentMode = 'driver', results = [], cooldown = false, isLooping = false, loopInterval;
        const canvas = document.getElementById('oscillo'), ctx = canvas.getContext('2d');

        async function initMics() {
            try {
                const devs = await navigator.mediaDevices.enumerateDevices();
                const select = document.getElementById('micSelect');
                select.innerHTML = devs.filter(d => d.kind === 'audioinput').map(d => `<option value="${d.deviceId}">${d.label || 'Microfone'}</option>`).join('');
            } catch (e) { console.error(e); }
        }

        function setMode(m) {
            currentMode = m;
            document.getElementById('mDriver').className = m === 'driver' ? 'flex-1 py-2 rounded-lg text-[10px] font-bold bg-purple-600 text-white uppercase' : 'flex-1 py-2 rounded-lg text-[10px] font-bold text-gray-500 uppercase';
            document.getElementById('mSub').className = m === 'sub' ? 'flex-1 py-2 rounded-lg text-[10px] font-bold bg-orange-600 text-white uppercase' : 'flex-1 py-2 rounded-lg text-[10px] font-bold text-gray-500 uppercase';
            if(isLooping) { stopLoop(); toggleLoop(); } // Reinicia o loop com o som novo
        }

        // --- GERADOR DE SINAL ---
        function playPulse() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const dur = 0.5, sr = audioCtx.sampleRate, buffer = audioCtx.createBuffer(1, sr * dur, sr), data = buffer.getChannelData(0);
            
            for (let i = 0; i < sr * dur; i++) {
                let t = i / sr;
                if (currentMode === 'driver') {
                    // Pulso Agudo (1kHz) com ataque positivo forte
                    if (t < 0.1) data[i] = Math.exp(-t * 100) * Math.sin(2 * Math.PI * 1000 * t);
                } else {
                    // Pulso Grave (50Hz) para mover o cone do Sub
                    if (t < 0.4) data[i] = Math.exp(-t * 15) * Math.sin(2 * Math.PI * 50 * t);
                }
            }

            const src = audioCtx.createBufferSource();
            src.buffer = buffer;
            src.connect(audioCtx.destination);
            src.start();
        }

        function toggleLoop() {
            if (isLooping) {
                stopLoop();
            } else {
                isLooping = true;
                document.getElementById('btnLoop').classList.add('loop-active');
                playPulse();
                loopInterval = setInterval(playPulse, 1000);
            }
        }

        function stopLoop() {
            isLooping = false;
            clearInterval(loopInterval);
            document.getElementById('btnLoop').classList.remove('loop-active');
        }

        // --- DETECTOR ---
        async function toggleScanner() {
            if (isRunning) { stopScanner(); return; }
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: document.getElementById('micSelect').value, echoCancellation: false } });
            micSource = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            micSource.connect(analyser);
            isRunning = true; results = []; 
            document.getElementById('mainBtn').innerText = '⏹ Parar Detector';
            document.getElementById('mainBtn').style.background = '#ef4444';
            document.getElementById('resArea').classList.add('hidden');
            [0,1,2].forEach(i => document.getElementById('dot'+i).classList.remove('active'));
            draw(); process();
        }

        function stopScanner() {
            isRunning = false; cancelAnimationFrame(aniId);
            document.getElementById('mainBtn').innerText = '🎤 Ativar Detector';
            document.getElementById('mainBtn').style.background = '#9333ea';
        }

        function process() {
            if (!isRunning) return;
            const data = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(data);
            let max = 0, idx = 0;
            for (let i = 0; i < data.length; i++) { if (Math.abs(data[i]) > max) { max = Math.abs(data[i]); idx = i; } }
            const threshold = 0.05 + (document.getElementById('sensSlider').value / 100) * 0.5;
            if (max > threshold && !cooldown) {
                results.push(data[idx] > 0);
                document.getElementById('dot' + (results.length - 1)).classList.add('active');
                cooldown = true; setTimeout(() => cooldown = false, 700);
                if (results.length >= 3) {
                    const pos = results.filter(r => r === true).length >= 2;
                    const area = document.getElementById('resArea');
                    area.classList.remove('hidden');
                    area.style.borderColor = pos ? '#22c55e' : '#ef4444';
                    area.style.background = pos ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)';
                    document.getElementById('resIcon').innerText = pos ? '⊕' : '⊖';
                    document.getElementById('resIcon').style.color = pos ? '#22c55e' : '#ef4444';
                    document.getElementById('resText').innerText = pos ? 'POSITIVA' : 'INVERTIDA';
                    document.getElementById('resText').style.color = pos ? '#22c55e' : '#ef4444';
                    stopScanner();
                }
            }
            aniId = requestAnimationFrame(process);
        }

        function draw() {
            if (!isRunning) return; requestAnimationFrame(draw);
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteTimeDomainData(data);
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2; ctx.strokeStyle = currentMode === 'driver' ? '#a855f7' : '#f97316';
            ctx.beginPath(); let x = 0, slice = canvas.width / data.length;
            for (let i = 0; i < data.length; i++) {
                let y = (data[i] / 128.0) * canvas.height / 2;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); x += slice;
            }
            ctx.stroke();
        }
        document.getElementById('sensSlider').oninput = (e) => document.getElementById('sensVal').innerText = e.target.value + '%';
        window.onload = () => { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; initMics(); };
    </script>
</body>
</html>
