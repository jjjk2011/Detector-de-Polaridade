<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Fase Pro - AudioBase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0e14;
            --card-bg: #161b22;
            --accent-purple: #a370f7;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --success: #44ff44;
            --danger: #ff4d4d;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        .top-bar { width: 100%; padding: 20px; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; }
        .btn-back { color: var(--text-main); text-decoration: none; padding: 10px 15px; border-radius: 12px; background: var(--card-bg); border: 1px solid #333; }
        .container { width: 90%; max-width: 500px; text-align: center; }

        /* Visualizador de Onda */
        .visualizer-box { background: #000; border: 1px solid var(--accent-purple); border-radius: 15px; margin: 20px 0; position: relative; height: 120px; overflow: hidden; }
        canvas { width: 100%; height: 100%; }

        /* Resultado */
        .result-display {
            background: var(--card-bg);
            border: 3px solid #333;
            border-radius: 25px;
            padding: 40px 20px;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .result-display.pos { border-color: var(--success); box-shadow: 0 0 20px rgba(68, 255, 68, 0.2); }
        .result-display.neg { border-color: var(--danger); box-shadow: 0 0 20px rgba(255, 77, 77, 0.2); }

        .status-text { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
        .main-res { font-size: 2.2rem; font-weight: bold; margin: 15px 0; }
        
        .btn-test {
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            border: none;
            background: var(--accent-purple);
            color: #000;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(163, 112, 247, 0.3);
        }
        .btn-test:active { transform: scale(0.98); }
        .btn-test.stop { background: #ff4d4d; }

        .log { font-size: 0.8rem; color: var(--accent-purple); margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <span>PHASE SCANNER</span>
        <div style="width:40px"></div>
    </div>

    <div class="container">
        <div class="visualizer-box">
            <canvas id="canvas"></canvas>
        </div>

        <div id="card-res" class="result-display">
            <div class="status-text" id="status-label">Aguardando Início</div>
            <div class="main-res" id="text-res">---</div>
            <div id="log-msg" class="log">Clique para iniciar o microfone</div>
        </div>

        <button id="btn-action" class="btn-test" onclick="startEngine()">
            <i class="fas fa-play"></i> INICIAR SCANNER
        </button>

        <p style="color: #666; font-size: 0.8rem; margin-top: 20px;">
            Dica: Aproxime o microfone do alto-falante para melhor precisão.
        </p>
    </div>

    <script>
        let audioCtx, analyser, source, isRunning = false;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        async function startEngine() {
            if (isRunning) {
                location.reload(); // Para tudo e reseta
                return;
            }

            try {
                // 1. Inicializa Áudio
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 1024;
                source.connect(analyser);

                isRunning = true;
                document.getElementById('btn-action').innerHTML = '<i class="fas fa-stop"></i> PARAR TESTE';
                document.getElementById('btn-action').classList.add('stop');
                document.getElementById('status-label').innerText = "Ouvindo Ambiente...";
                document.getElementById('log-msg').innerText = "Iniciando pulsos...";

                draw();
                loopPulse();

            } catch (err) {
                alert("Erro ao acessar microfone: " + err);
            }
        }

        function loopPulse() {
            if (!isRunning) return;

            // Gera o estalo (Pulso Assimétrico Positivo)
            const duration = 0.05; 
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sawtooth'; // Onda dente de serra gera um pico forte
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.005);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.02);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);

            // Analisa o retorno após 40ms (tempo do som viajar no ar)
            setTimeout(analyze, 40);

            // Repete o pulso a cada 1.2 segundos
            setTimeout(loopPulse, 1200);
        }

        function analyze() {
            const data = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(data);

            let peakPos = 0;
            let peakNeg = 0;

            // Procura o maior pico positivo e o maior negativo na amostra
            for (let i = 0; i < data.length; i++) {
                if (data[i] > peakPos) peakPos = data[i];
                if (data[i] < peakNeg) peakNeg = data[i];
            }

            const card = document.getElementById('card-res');
            const text = document.getElementById('text-res');
            const log = document.getElementById('log-msg');

            // Sensibilidade aumentada: se o sinal for maior que 0.03
            if (peakPos > 0.03 || Math.abs(peakNeg) > 0.03) {
                if (peakPos > Math.abs(peakNeg)) {
                    card.className = "result-display pos";
                    text.innerText = "NORMAL (+)";
                    text.style.color = "var(--success)";
                    log.innerText = "Pico positivo detectado!";
                } else {
                    card.className = "result-display neg";
                    text.innerText = "INVERTIDA (-)";
                    text.style.color = "var(--danger)";
                    log.innerText = "Pico negativo detectado!";
                }
            } else {
                log.innerText = "Sinal muito baixo... aproxime o mic.";
            }
        }

        function draw() {
            if (!isRunning) return;
            requestAnimationFrame(draw);
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteTimeDomainData(data);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#a370f7';
            ctx.beginPath();
            const sliceWidth = canvas.width / data.length;
            let x = 0;
            for (let i = 0; i < data.length; i++) {
                const v = data[i] / 128.0;
                const y = v * canvas.height / 2;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.stroke();
        }
    </script>
</body>
</html>
