<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polarity Scan | AudioBase Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0d14; color: #c9d1d9; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 1.5rem; }
        canvas { width: 100%; height: 120px; background: #000; border-radius: 1rem; border: 1px solid #30363d; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #30363d; transition: 0.3s; }
        .dot.active { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        select { background: #0a0d14 !important; border: 1px solid #30363d !important; color: white !important; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto space-y-4">
        <header class="flex justify-between items-center py-2">
            <a href="index.html" class="text-cyan-500 text-[10px] font-black">← Menu</a>
            <h1 class="text-white font-black text-xs tracking-widest uppercase">Polarity Scan</h1>
        </header>

        <div class="card p-5">
            <canvas id="oscillo"></canvas>
            <div id="resArea" class="hidden text-center p-4 rounded-2xl border-2 my-4">
                <div id="resIcon" class="text-4xl font-bold"></div>
                <div id="resText" class="text-lg font-black tracking-widest"></div>
            </div>
            <div class="flex justify-center gap-3 mb-4">
                <div class="dot" id="dot0"></div><div class="dot" id="dot1"></div><div class="dot" id="dot2"></div>
            </div>
            <button id="mainBtn" onclick="toggleScanner()" class="w-full py-4 bg-purple-600 rounded-2xl font-black text-white uppercase text-sm tracking-widest">🎤 Ativar Detector</button>
        </div>

        <div class="card p-5 space-y-4">
            <div class="flex gap-2 p-1 bg-black/40 rounded-xl">
                <button id="mDriver" onclick="setMode('driver')" class="flex-1 py-2 rounded-lg text-[10px] font-bold bg-purple-600 text-white">🔊 DRIVERS</button>
                <button id="mSub" onclick="setMode('sub')" class="flex-1 py-2 rounded-lg text-[10px] font-bold text-gray-500">🎵 SUBWOOFER</button>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-500 block mb-2 uppercase">🎙️ Seleção de Mic</label>
                <select id="micSelect" class="w-full p-3 rounded-xl text-xs outline-none"></select>
            </div>
            <div>
                <div class="flex justify-between text-[10px] font-bold text-gray-500 mb-2 uppercase"><span>⚡ Trigger (Sensib.)</span><span id="sensVal">25%</span></div>
                <input type="range" id="sensSlider" class="w-full h-1 bg-gray-700 rounded-lg appearance-none accent-purple-500" value="25">
            </div>
        </div>
    </div>

    <script>
        let audioCtx, analyser, micSource, aniId, isRunning = false, currentMode = 'driver', results = [], cooldown = false;
        const canvas = document.getElementById('oscillo'), ctx = canvas.getContext('2d');

        async function initMics() {
            const devs = await navigator.mediaDevices.enumerateDevices();
            document.getElementById('micSelect').innerHTML = devs.filter(d => d.kind === 'audioinput').map(d => `<option value="${d.deviceId}">${d.label || 'Microfone'}</option>`).join('');
        }

        function setMode(m) {
            currentMode = m;
            document.getElementById('mDriver').className = m === 'driver' ? 'flex-1 py-2 rounded-lg text-[10px] font-bold bg-purple-600 text-white' : 'flex-1 py-2 rounded-lg text-[10px] font-bold text-gray-500';
            document.getElementById('mSub').className = m === 'sub' ? 'flex-1 py-2 rounded-lg text-[10px] font-bold bg-orange-600 text-white' : 'flex-1 py-2 rounded-lg text-[10px] font-bold text-gray-500';
        }

        async function toggleScanner() {
            if(isRunning) { stopScanner(); return; }
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: document.getElementById('micSelect').value, echoCancellation: false } });
            micSource = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            micSource.connect(analyser);
            isRunning = true; results = []; 
            document.getElementById('mainBtn').innerText = '⏹ Parar';
            document.getElementById('resArea').classList.add('hidden');
            [0,1,2].forEach(i => document.getElementById('dot'+i).classList.remove('active'));
            draw(); process();
        }

        function stopScanner() {
            isRunning = false; cancelAnimationFrame(aniId); if(audioCtx) audioCtx.close();
            document.getElementById('mainBtn').innerText = '🎤 Ativar Detector';
        }

        function process() {
            if(!isRunning) return;
            const data = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(data);
            let max = 0, idx = 0;
            for(let i=0; i<data.length; i++) { if(Math.abs(data[i]) > max) { max = Math.abs(data[i]); idx = i; } }
            const threshold = 0.05 + (document.getElementById('sensSlider').value / 100) * 0.5;
            if(max > threshold && !cooldown) {
                results.push(data[idx] > 0);
                document.getElementById('dot'+(results.length-1)).classList.add('active');
                cooldown = true; setTimeout(() => cooldown = false, 600);
                if(results.length >= 3) {
                    const pos = results.filter(r => r === true).length >= 2;
                    const area = document.getElementById('resArea');
                    area.classList.remove('hidden');
                    area.style.borderColor = pos ? '#22c55e' : '#ef4444';
                    document.getElementById('resIcon').innerText = pos ? '⊕' : '⊖';
                    document.getElementById('resText').innerText = pos ? 'POSITIVA' : 'INVERTIDA';
                    stopScanner();
                }
            }
            aniId = requestAnimationFrame(process);
        }

        function draw() {
            if(!isRunning) return; requestAnimationFrame(draw);
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteTimeDomainData(data);
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.lineWidth = 2; ctx.strokeStyle = '#a855f7';
            ctx.beginPath(); let x = 0, slice = canvas.width / data.length;
            for(let i=0; i<data.length; i++) {
                let y = (data[i]/128.0) * canvas.height/2;
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); x += slice;
            }
            ctx.stroke();
        }
        document.getElementById('sensSlider').oninput = (e) => document.getElementById('sensVal').innerText = e.target.value + '%';
        window.onload = initMics;
    </script>
</body>
</html>
